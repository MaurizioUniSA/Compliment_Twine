ulation_Intro]]", "Regulation_Q1_Incorrect_ConserveProteins": "<div class=\"section-label regulation\">Regulation</div>\n<div class=\"feedback-incorrect\">\n<strong>Not quite.</strong> While complement proteins are replenished continuously by the liver, the primary reason for regulation is to prevent damage to healthy host cells and tissues.\n</div>\n[[← Try again|Regulation_Intro]]", "Regulation_Q1_Correct_PreventSelfDamage": "<div class=\"section-label regulation\">Regulation</div>\n<div class=\"feedback-correct\">\n<strong>Exactly!</strong> Uncontrolled complement activation causes bystander damage to healthy tissues and contributes to various pathologies. Regulation ensures complement is targeted and proportionate.\n</div>\n<div style=\"margin:.6rem 0 .8rem;padding:.5rem .85rem;background:#e8f9ef;border-left:3px solid #27a85f;border-radius:0 7px 7px 0;font-size:.93rem;color:#14472e\"><strong>Remember:</strong> Complement is non-specific — without regulation it would attack self. Every regulatory protein exists to protect host tissue, not just to limit the response.</div>\n[[Continue → Soluble Regulators|Regulation_SolubleRegulators]]", "Regulation_SolubleRegulators": "<div class=\"section-label regulation\">Regulation</div>\n<div class=\"progress-label\">Regulation · Step 2 of 4</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:50%\"></div></div>\n\n<img src=\"C'_Images/Slide9.PNG\" style=\"width:100%;border-radius:9px;margin:0.75rem auto 1rem;display:block;\" alt=\"C1 Inhibitor (C1INH) covalently blocking activated C1r and C1s, preventing uncontrolled classical pathway activation\">\n\n<h2>Soluble Regulators: C1 Inhibitor (C1INH)</h2>\n<p><strong>C1 Inhibitor (C1INH)</strong> is a serine protease inhibitor (serpin):</p>\n<div class=\"key-box\">\n• Covalently binds and inactivates <strong>C1r and C1s</strong> (Classical pathway)<br>\n• Also inhibits <strong>MASP-1 and MASP-2</strong> (Lectin pathway)<br>\n• Deficiency causes <strong>Hereditary Angioedema (HAE)</strong> — overproduction of bradykinin and uncontrolled C1 activation\n</div>\n\n<div class=\"key-box\">\n<strong>C4b-Binding Protein (C4bp)</strong> \u2014 a soluble plasma protein that regulates the <strong>Classical and Lectin pathway C3 convertases</strong> in the fluid phase:<br>\n• Displaces C2a from C4b2a (decay acceleration)<br>\n• Acts as cofactor for <strong>Factor I</strong>, which cleaves C4b \u2192 inactive iC4b<br>\n<em>C4bp is to the Classical/Lectin pathway what Factor H is to the Alternative pathway.</em>\n</div>\n\n<p>''C1 Inhibitor primarily regulates which complement pathway steps?''</p>\n\n[[A) Formation of the Membrane Attack Complex|Regulation-Q2-Incorrect-MAC]]\n[[B) Activity of C3 convertases|Regulation-Q2-Incorrect-C3ConvertaseActivity]]\n[[C) Initial activation steps of the Classical and Lectin pathways|Regulation_Q2_Correct_ClassicalLectinInit]]", "Regulation-Q2-Incorrect-MAC": "<div class=\"section-label regulation\">Regulation</div>\n<div class=\"feedback-incorrect\">\n<strong>Not quite.</strong> MAC regulation is handled by different proteins (notably CD59). C1INH acts much earlier — its name gives a strong clue: it targets the C1 complex and its equivalents in the lectin pathway.\n</div>\n[[← Try again|Regulation_SolubleRegulators]]", "Regulation-Q2-Incorrect-C3ConvertaseActivity": "<div class=\"section-label regulation\">Regulation</div>\n<div class=\"feedback-incorrect\">\n<strong>Not the primary target.</strong> C1INH acts before the C3 convertase is even formed — it inhibits C1s and MASP-2, preventing them from cleaving C4 and C2. Other regulators (DAF, MCP, CR1) handle C3 convertase activity directly.\n</div>\n[[← Try again|Regulation_SolubleRegulators]]", "Regulation_Q2_Correct_ClassicalLectinInit": "<div class=\"section-label regulation\">Regulation</div>\n<div class=\"feedback-correct\">\n<strong>Correct!</strong> C1INH controls the early activation steps — inhibiting C1r, C1s, and the MASPs — preventing unnecessary complement activation at the very start of both pathways.\n</div>\n<div style=\"margin:.6rem 0 .8rem;padding:.5rem .85rem;background:#e8f9ef;border-left:3px solid #27a85f;border-radius:0 7px 7px 0;font-size:.93rem;color:#14472e\"><strong>Remember:</strong> C1INH acts at the very start — if C1r/C1s and MASPs are blocked, no C4 or C2 is cleaved, and neither classical nor lectin C3 convertase forms.</div>\n[[Continue → Cell-Bound Regulators & Factor H|Regulation_FactorH]]", "Regulation_FactorH": "<div class=\"section-label regulation\">Regulation</div>\n<div class=\"progress-label\">Regulation · Step 3 of 4</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:75%\"></div></div>\n\n<img src=\"C'_Images/Slide11.PNG\" style=\"width:100%;border-radius:9px;margin:0.75rem auto 1rem;display:block;\" alt=\"Factor I cleaving C3b into iC3b (with Factor H as cofactor), terminating the amplification loop\">\n\n<h2>Factor H: Protecting Self via the Alternative Pathway</h2>\n<p>Factor H is a soluble plasma protein critical for controlling the alternative pathway, especially on <strong>host cell surfaces</strong>:</p>\n<div class=\"key-box\">\n• Competes with Factor B for binding to C3b (prevents C3bBb formation)<br>\n• Accelerates decay of existing C3bBb<br>\n• Acts as a cofactor for <strong>Factor I</strong>, which cleaves C3b → inactive <strong>iC3b</strong><br>\n• Has higher affinity for C3b on host cells (recognises sialic acid and glycosaminoglycans)\n</div>\n<div class=\"key-box\" style=\"font-size:.9rem;background:#f8f8ff;\">\n<em><strong>iC3b and receptor specificity:</strong> Once cleaved to iC3b, the fragment can no longer re-enter the amplification loop. Critically, iC3b binds <strong>CR3 (CD11b/Mac-1)</strong> and <strong>CR4 (CD11c)</strong> on phagocytes — not CR1. CR3 and CR4 generate a stronger phagocytic signal, making iC3b-opsonised pathogens highly effective targets for macrophage and neutrophil killing. CR1 (CD35) preferentially binds intact C3b and C4b, and is the main immune complex transport receptor on red blood cells.</em>\n</div>\n<p>This selectivity protects host cells from alternative pathway amplification while allowing it to proceed on microbial surfaces.</p>\n\n<p>''A primary mechanism by which Factor H regulates the alternative pathway is:''</p>\n\n[[A) Directly inhibiting Factor D|Regulation-Q3-Incorrect-InhibitFactorD]]\n[[B) Acting as a cofactor for Factor I to cleave C3b|Regulation_Q3_Correct_CofactorFactorI]]\n[[C) Binding to Properdin and preventing its stabilising effect|Regulation-Q3-Incorrect-BindProperdin]]", "Regulation-Q3-Incorrect-InhibitFactorD": "<div class=\"section-label regulation\">Regulation</div>\n<div class=\"feedback-incorrect\">\n<strong>Not the main mechanism.</strong> Direct inhibition of Factor D is not a recognised major function of Factor H. Factor H's mechanisms focus on C3b itself — competing with Factor B, promoting convertase decay, and enabling Factor I-mediated cleavage of C3b.\n</div>\n[[← Try again|Regulation_FactorH]]", "Regulation-Q3-Incorrect-BindProperdin": "<div class=\"section-label regulation\">Regulation</div>\n<div class=\"feedback-incorrect\">\n<strong>Interesting thought, but incorrect.</strong> Factor H and Properdin have opposing effects on C3bBb, but Factor H does not inhibit Properdin by direct binding. Factor H's primary mechanisms involve acting on C3b itself (competition with Factor B, cofactor for Factor I, and promoting convertase decay).\n</div>\n[[← Try again|Regulation_FactorH]]", "Regulation_Q3_Correct_CofactorFactorI": "<div class=\"section-label regulation\">Regulation</div>\n<div class=\"feedback-correct\">\n<strong>Correct!</strong> When Factor H binds C3b, it enables Factor I (a serine protease) to cleave C3b into inactive iC3b — effectively dismantling any potential convertase and preventing further amplification.\n</div>\n<div style=\"margin:.6rem 0 .8rem;padding:.5rem .85rem;background:#e8f9ef;border-left:3px solid #27a85f;border-radius:0 7px 7px 0;font-size:.93rem;color:#14472e\"><strong>Remember:</strong> Factor H + Factor I = the team that inactivates C3b. Factor H brings Factor I to C3b; Factor I does the cutting.</div>\n[[Continue → CD59 and MAC Inhibition|Regulation_CD59]]", "Regulation_CD59": "<div class=\"section-label regulation\">Regulation</div>\n<div class=\"progress-label\">Regulation · Step 4 of 4</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:100%\"></div></div>\n\n<img src=\"C'_Images/Slide12.PNG\" style=\"width:90%;border-radius:9px;margin:0.75rem auto 1rem;display:block;\" alt=\"Vitronectin (S protein) binding C5b-67 complex to block membrane insertion and prevent bystander lysis\">\n\n<h2>Inhibiting the MAC: CD59 (Protectin) and DAF (CD55)</h2>\n<p>Two GPI-anchored membrane proteins protect host cells from complement attack at different points in the cascade:</p>\n<div class=\"key-box\">\n<strong>DAF (Decay Accelerating Factor / CD55)</strong><br>\n• Expressed on host cell surfaces<br>\n• Accelerates the <strong>spontaneous decay of C3 and C5 convertases</strong> — displaces the catalytic subunit (C2a from C4b2a; Bb from C3bBb)<br>\n• Acts at the <em>convertase level</em>: prevents amplification before the MAC can form\n</div>\n<div class=\"key-box\">\n<strong>CD59 (Protectin)</strong><br>\n• Binds to the <strong>C5b-8 complex</strong> after it inserts into the host cell membrane<br>\n• Sterically blocks the binding and polymerisation of C9 molecules<br>\n• Acts at the <em>MAC level</em>: the last line of defence\n</div>\n<div class=\"key-box\">\n<strong>Clinical relevance — PNH:</strong> A somatic <em>PIGA</em> mutation disrupts GPI anchor synthesis. <strong>Both DAF (CD55) and CD59 are lost</strong> from red blood cell surfaces simultaneously. Without DAF, convertases persist; without CD59, MAC assembles freely \u2014 causing <strong>Paroxysmal Nocturnal Haemoglobinuria (PNH)</strong>.\n</div>\n\n<p>''CD59 primarily prevents complement-mediated damage by interfering with:''</p>\n\n[[A) Binding of C3b to surfaces|Regulation-Q4-Incorrect-C3bBinding]]\n[[B) Cleavage of C5 by the C5 convertase|Regulation-Q4-Incorrect-C5Cleavage]]\n[[C) Polymerisation of C9 to form the MAC pore|Regulation_Q4_Correct_C9Polymerization]]", "Regulation-Q4-Incorrect-C3bBinding": "<div class=\"section-label regulation\">Regulation</div>\n<div class=\"feedback-incorrect\">\n<strong>Not quite.</strong> C3b regulation is handled earlier by Factor H, Factor I, MCP/CD46, and DAF/CD55. CD59 acts at the very end of the pathway, specifically targeting MAC assembly.\n</div>\n[[← Try again|Regulation_CD59]]", "Regulation-Q4-Incorrect-C5Cleavage": "<div class=\"section-label regulation\">Regulation</div>\n<div class=\"feedback-incorrect\">\n<strong>Not where CD59 acts.</strong> C5 cleavage is carried out by the C5 convertase. CD59 acts after C5b has been generated and the terminal components have begun assembling — it blocks the very final step of pore formation.\n</div>\n[[← Try again|Regulation_CD59]]", "Regulation_Q4_Correct_C9Polymerization": "<div class=\"section-label regulation\">Regulation</div>\n<div class=\"feedback-correct\">\n<strong>Correct!</strong> CD59 binds C5b-8 and physically blocks C9 from polymerising, preventing the complete pore from forming.\n</div>\n<div style=\"margin:.6rem 0 .8rem;padding:.5rem .85rem;background:#e8f9ef;border-left:3px solid #27a85f;border-radius:0 7px 7px 0;font-size:.93rem;color:#14472e\"><strong>Remember:</strong> CD59 is the last line of defence — even when MAC assembly has begun, blocking C9 polymerisation prevents the lethal pore from forming.</div>\n[[Continue → Regulation Summary|Regulation_Summary]]", "Regulation_Summary": "<div class=\"section-label regulation\">Regulation</div>\n\n<h2>Complement Regulation: A Vital Balance</h2>\n<div class=\"key-box\">\n<strong>C1INH</strong> — inhibits C1r, C1s, MASP-1, MASP-2 (early Classical/Lectin activation)<br>\n<strong>Factor H + Factor I</strong> — inactivate C3b in the Alternative pathway<br>\n<strong>DAF (CD55)</strong> — accelerates decay of C3/C5 convertases<br>\n<strong>MCP (CD46)</strong> — cofactor for Factor I on host cell surfaces<br>\n<strong>CR1 (CD35)</strong> — decay-accelerating activity + cofactor for Factor I<br>\n<strong>CD59</strong> — inhibits MAC (C9 polymerisation)\n</div>\n<div class=\"key-box\" style=\"background:#fff3e0;border-color:#ffa040;\">\n<strong>\ud83d\udd11 The Core Principle — Self vs Non-Self Discrimination:</strong><br>\nHost cells constitutively express these regulatory proteins (DAF, MCP, CR1, CD59, Factor H binding sites). Pathogens do not. This is how complement distinguishes self from non-self \u2014 not by recognising pathogens directly, but by the <em>absence of the molecular \u2018off-switches\u2019</em> that protect host tissues. Complement activation is the default state; host cell survival requires active, ongoing suppression.\n</div>\n<p>This network ensures complement is a powerful defender against pathogens while protecting our own cells.</p>\n\n[[Complement Evasion by Pathogens|Complement-Evasion]]\n[[Activity Complete — Final Summary|Complement-Summary-Victory]]", "Complement-Evasion": "<div class=\"section-label regulation\">Regulation</div>\n<h2>Complement Evasion by Pathogens</h2>\n<p>Successful pathogens have evolved multiple strategies to hijack or neutralise complement — understanding these explains why some organisms cause recurrent or severe disease even in immunocompetent hosts.</p>\n<div class=\"key-box\">\n<strong>1. Surface recruitment of Factor H</strong><br>\n<em>Neisseria meningitidis</em> (factor H binding protein, fHbp) and <em>Streptococcus pyogenes</em> (M protein) recruit host Factor H to their surface. This mimics a host-cell signal, causing Factor I to degrade surface-bound C3b → iC3b, blocking amplification.\n</div>\n<div class=\"key-box\">\n<strong>2. Convertase inhibition</strong><br>\n<em>Staphylococcus aureus</em> secretes <strong>SCIN (Staphylococcal Complement Inhibitor)</strong>, which stabilises C3 convertases in an inactive state — they persist but cannot cleave C3. It also secretes <strong>Efb</strong>, which binds C3b directly and blocks Factor B binding.\n</div>\n<div class=\"key-box\">\n<strong>3. C5a receptor blockade</strong><br>\n<em>S. aureus</em> also produces <strong>CHIPS (Chemotaxis Inhibitory Protein)</strong>, which blocks C5aR1 on neutrophils and monocytes — preventing chemotaxis to the site of infection even when C5a is generated normally.\n</div>\n<div class=\"key-box\">\n<strong>4. MAC resistance</strong><br>\nGram-positive bacteria (thick peptidoglycan) and some Gram-negatives with modified LPS (e.g. <em>Salmonella</em>) are inherently resistant to MAC insertion. Serum-resistant strains of <em>Neisseria gonorrhoeae</em> acquire complement regulatory proteins from host serum to prevent MAC assembly.\n</div>\n<div style=\"background:#fff3e0;border:1px solid #ffa040;border-radius:9px;padding:.75rem 1rem;margin:.85rem 0;font-size:.93rem;\">\n<strong>Clinical relevance:</strong> fHbp from <em>N. meningitidis</em> is the key antigen in the <strong>Bexsero</strong> and <strong>Trumenba</strong> MenB vaccines — vaccinating against the evasion mechanism itself.\n</div>\n[[← Back to Regulation Summary|Regulation_Summary]]",
"Complement-Summary-Victory": "<div class=\"section-label shared\">Complete!</div>\n\n<h1>🎉 Activity Complete</h1>\n<p>You have successfully explored the complement system — from pathway initiation through to the Membrane Attack Complex and its regulation.</p>\n\n<h2>Key Outcomes of Complement Activation</h2>\n<div class=\"key-box\">\n<strong>1. Opsonisation (C3b, C4b)</strong><br>\n\"Eat me\" signals on pathogens recognised by phagocytes via complement receptors.\n</div>\n<div class=\"key-box\">\n<strong>2. Inflammation (C3a, C5a, C4a)</strong><br>\nAnaphylatoxins drive mast cell degranulation, vasodilation, smooth muscle contraction, and neutrophil recruitment.\n</div>\n<div class=\"key-box\">\n<strong>3. Direct Lysis (MAC / C5b-9)</strong><br>\nPore formation in susceptible pathogens (Gram-negative bacteria, enveloped viruses).\n</div>\n<div class=\"key-box\">\n<strong>4. Immune Complex Clearance</strong><br>\nC3b tags complexes for clearance, preventing tissue deposition.\n</div>\n\n<h2>5. Bridge to Adaptive Immunity (C3d / CR2)</h2>\n<div class=\"key-box\">\nC3b deposited on antigens is progressively cleaved to <strong>C3d</strong>. C3d remains covalently attached to the antigen and binds <strong>CR2 (CD21)</strong> on B cells. CR2 is part of the <strong>B cell co-stimulatory complex</strong> (CR2/CD19/CD81) \u2014 its engagement alongside the B cell receptor lowers the activation threshold by up to <strong>1,000-fold</strong>. This is how complement bridges the innate response to adaptive immunity, amplifying antibody production against complement-tagged pathogens.\n</div>\n<h2>Regulatory Proteins</h2>\n<p>C1INH, Factor H, Factor I, DAF (CD55), MCP (CD46), CR1, and CD59 collectively ensure complement is precisely targeted — dysregulation leads to diseases including HAE, PNH, and various autoimmune conditions.</p>\n<div class=\"key-box\" style=\"background:#eef8f0;border-color:#27a85f;\">\n<strong>Complement as a Therapeutic Target:</strong><br>\n\u2022 <strong>Eculizumab</strong> (anti-C5 monoclonal antibody) blocks C5 cleavage \u2014 prevents MAC formation. Licensed for PNH, atypical HUS (aHUS), and generalised myasthenia gravis.\n<br>\u2022 <strong>Avacopan</strong> (C5aR1 antagonist) blocks C5a signalling \u2014 prevents neutrophil-driven inflammation. Licensed for ANCA-associated vasculitis.\n<br>\u2022 <strong>Sutimlimab</strong> (anti-C1s antibody) blocks the Classical pathway at C1s. Licensed for cold agglutinin disease.\n<br><em>Complement therapeutics is one of the fastest-growing areas of clinical immunology.</em>\n</div>\n\n<h2>Pathway Comparison — Quick Reference</h2>\n<div style=\"overflow-x:auto;margin:.8rem 0;\">\n<table class=\"clinical-table\" style=\"font-size:.88rem;\">\n  <tr>\n    <th></th>\n    <th style=\"background:#e6f0ff;color:#0a4d8f;\">Classical</th>\n    <th style=\"background:#e6fff0;color:#0a5c35;\">Alternative</th>\n    <th style=\"background:#fff8e6;color:#7a4800;\">Lectin</th>\n  </tr>\n  <tr>\n    <td><strong>Trigger</strong></td>\n    <td>IgM / IgG antibody\u2013antigen complexes</td>\n    <td>Spontaneous C3 tick-over; C3b on any surface</td>\n    <td>MBL/Ficolins bind microbial carbohydrates</td>\n  </tr>\n  <tr>\n    <td><strong>Initiating molecule</strong></td>\n    <td>C1q</td>\n    <td>C3(H\u2082O)</td>\n    <td>MBL / Ficolin</td>\n  </tr>\n  <tr>\n    <td><strong>Key proteases</strong></td>\n    <td>C1r, C1s</td>\n    <td>Factor D (cleaves Factor B)</td>\n    <td>MASP-1, MASP-2</td>\n  </tr>\n  <tr>\n    <td><strong>C3 convertase</strong></td>\n    <td>C4b2a</td>\n    <td>C3bBbP</td>\n    <td>C4b2a (identical to Classical)</td>\n  </tr>\n  <tr>\n    <td><strong>C5 convertase</strong></td>\n    <td>C4b2a3b</td>\n    <td>C3bBb3bP</td>\n    <td>C4b2a3b (identical to Classical)</td>\n  </tr>\n  <tr>\n    <td><strong>Key positive regulator</strong></td>\n    <td>\u2014</td>\n    <td>Properdin (stabilises C3bBb)</td>\n    <td>\u2014</td>\n  </tr>\n  <tr>\n    <td><strong>Key negative regulators</strong></td>\n    <td>C1INH, C4bp</td>\n    <td>Factor H + Factor I</td>\n    <td>C1INH (inhibits MASPs), C4bp</td>\n  </tr>\n  <tr>\n    <td><strong>Antibody required?</strong></td>\n    <td>Yes</td>\n    <td>No</td>\n    <td>No</td>\n  </tr>\n</table>\n</div>\n\n<p>''What would you like to do next?''</p>\n\n[[📋 Step Forward to Clinical Case Files (CH50 Defects)|Clinical-Notes-Menu]]\n[[📝 Test yourself — Retrieval Quiz|Retrieval-Intro]]\n[[Explore another pathway|Start-Complement]]", "Retrieval-Intro": "<div class=\"section-label shared\">Retrieval Practice</div>\n\n<h2>Test Yourself</h2>\n<p>These 10 questions ask you to recall facts from memory — there are no hints on incorrect answers. This kind of retrieval practice is one of the most effective ways to consolidate what you've learned and prepare for exams.</p>\n<div class=\"key-box\">\n<strong>No hints on wrong answers.</strong> If you get one wrong, the correct answer is shown — but try to retrieve it from memory before you look. That effortful attempt is what builds durable recall.\n</div>\n<p>At the end you will receive a percentage score. Aim for 80% or above — but the effortful attempt to recall from memory is what builds durable learning, regardless of the score.</p>\n<div class=\"key-box\">\n<strong>⚠️ Once you select an answer you cannot change it</strong> — this is intentional. Commit to an answer, then read the feedback carefully.\n</div>\n[[Start Retrieval Practice|Retrieval-Q1]]", "Retrieval-Q1": "<div class=\"section-label shared\">Retrieval Practice · 1 of 10</div>\n<div class=\"progress-label\">Retrieval Practice · Question 1 of 10</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:10%\"></div></div>\n\n<h2>After C1q binds to antibodyâantigen complexes, what is the immediate sequence of events before C4 is cleaved?</h2>\n<p><em>Think about the order of activation within the C1 complex.</em></p>\n\n[[C1r undergoes autoactivation, then cleaves and activates C1s; active C1s then cleaves C4|Retrieval-Q1-Correct]]\n[[C1q directly cleaves C4 once it engages the antibody Fc region|Retrieval-Q1-Wrong-A]]\n[[C1s is constitutively active and cleaves C4 immediately once C1 binds antibody|Retrieval-Q1-Wrong-B]]\n[[Factor D activates C1s by analogy with its role in the alternative pathway|Retrieval-Q1-Wrong-C]]", "Retrieval-Q1-Correct": "<div class=\"section-label shared\">Retrieval Practice · 1 of 10</div>\n<div class=\"feedback-correct\"><strong>Correct!</strong></div>\n<div class=\"key-box\">\nC1q binds â conformational change activates <strong>C1r</strong> (autoactivation)<br>\nC1r cleaves and activates <strong>C1s</strong><br>\nActive C1s (serine protease) cleaves <strong>C4</strong> â C4a (released) + C4b (surface-bound)<br>\nActive C1s also cleaves <strong>C2</strong> â generating the C3 convertase <strong>C4b2a</strong>\n</div>\n[[Next question →|Retrieval-Q2]]", "Retrieval-Q1-Wrong-A": "<div class=\"section-label shared\">Retrieval Practice · 1 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Not quite.</strong></div>\n<div class=\"key-box\">\n<strong>C1q has no proteolytic activity</strong> â it is a pattern recognition molecule, not an enzyme. Binding to IgM or clustered IgG triggers a conformational change that activates C1r, which then cleaves and activates C1s. Only <strong>C1s</strong> is the serine protease that cleaves C4 and C2.\n</div>\n[[Try the next question →|Retrieval-Q2]]", "Retrieval-Q1-Wrong-B": "<div class=\"section-label shared\">Retrieval Practice · 1 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Not quite.</strong></div>\n<div class=\"key-box\">\nC1s circulates as an <strong>inactive zymogen</strong>. It must first be cleaved and activated by C1r. The correct sequence: C1q binds â <strong>C1r autoactivates</strong> â C1r cleaves C1s â active C1s cleaves C4 then C2.\n</div>\n[[Try the next question →|Retrieval-Q2]]", "Retrieval-Q1-Wrong-C": "<div class=\"section-label shared\">Retrieval Practice · 1 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Not quite.</strong></div>\n<div class=\"key-box\">\nFactor D is an <strong>alternative pathway</strong> enzyme â it cleaves Factor B, not C1s. In the classical pathway, the activation cascade within the C1 complex is: <strong>C1r â C1s</strong>. MASP-2 is the lectin pathway functional equivalent of C1s, but operates on a separate MBL/Ficolin complex and has no interaction with C1.\n</div>\n[[Try the next question →|Retrieval-Q2]]", "Retrieval-Q2": "<div class=\"section-label shared\">Retrieval Practice · 2 of 10</div>\n<div class=\"progress-label\">Retrieval Practice · Question 2 of 10</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:20%\"></div></div>\n\n<h2>What are the C3 convertases of the Classical and Alternative pathways, and what do they both do?</h2>\n<p><em>Name both complexes and their shared function.</em></p>\n\n[[Classical: C4b2a · Alternative: C3bBbP · Both cleave C3 → C3a + C3b|Retrieval-Q2-Correct]]\n[[Classical: C3bBb · Alternative: C4b2a · Both activate Factor XII|Retrieval-Q2-Wrong-A]]\n[[Classical: C4b2a · Alternative: C3bBbP · Both cleave C5 → C5a + C5b|Retrieval-Q2-Wrong-B]]\n[[Classical: C1qrs · Alternative: C3bBb · Both cleave fibrinogen|Retrieval-Q2-Wrong-C]]", "Retrieval-Q2-Correct": "<div class=\"section-label shared\">Retrieval Practice · 2 of 10</div>\n<div class=\"feedback-correct\"><strong>Correct.</strong></div>\n<div class=\"key-box\">\n<strong>Classical C3 convertase:</strong> C4b2a (C4b + C2a)<br>\n<strong>Alternative C3 convertase:</strong> C3bBbP (C3b + Bb stabilised by Properdin)<br><br>\nBoth cleave C3 → <strong>C3a</strong> (anaphylatoxin) + <strong>C3b</strong> (opsonin + builds C5 convertase)\n</div>\n[[Next question →|Retrieval-Q3]]", "Retrieval-Q2-Wrong-A": "<div class=\"section-label shared\">Retrieval Practice · 2 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Not quite — the names are swapped.</strong></div>\n<div class=\"key-box\">\n<strong>Classical C3 convertase:</strong> <strong>C4b2a</strong> (contains fragments of C4 and C2)<br>\n<strong>Alternative C3 convertase:</strong> <strong>C3bBbP</strong> (contains C3b, Bb from Factor B, stabilised by Properdin)<br><br>\nBoth cleave C3 → C3a + C3b (not Factor XII — that's contact activation)\n</div>\n[[Next question →|Retrieval-Q3]]", "Retrieval-Q2-Wrong-B": "<div class=\"section-label shared\">Retrieval Practice · 2 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Close — the names are right but the function is wrong.</strong></div>\n<div class=\"key-box\">\n<strong>C4b2a</strong> and <strong>C3bBbP</strong> are correct ✓<br><br>\nBut C3 convertases cleave <strong>C3</strong> → C3a + C3b, not C5. The <em>C5 convertase</em> (formed when C3b binds to the C3 convertase) cleaves C5.\n</div>\n[[Next question →|Retrieval-Q3]]", "Retrieval-Q2-Wrong-C": "<div class=\"section-label shared\">Retrieval Practice · 2 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Not quite.</strong></div>\n<div class=\"key-box\">\nC1qrs is the initiation complex of the classical pathway — not a convertase.<br><br>\n<strong>Classical C3 convertase:</strong> <strong>C4b2a</strong><br>\n<strong>Alternative C3 convertase:</strong> <strong>C3bBbP</strong><br><br>\nBoth cleave <strong>C3</strong> → C3a + C3b. Fibrinogen is cleaved by thrombin (coagulation cascade — different system entirely).\n</div>\n[[Next question →|Retrieval-Q3]]", "Retrieval-Q3": "<div class=\"section-label shared\">Retrieval Practice · 3 of 10</div>\n<div class=\"progress-label\">Retrieval Practice · Question 3 of 10</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:30%\"></div></div>\n\n<h2>Name three regulatory proteins that protect host cells from complement, and state where in the cascade each acts.</h2>\n<p><em>Think about early, mid, and late points in the pathway.</em></p>\n\n[[C1INH (blocks C1r/C1s) · Factor H/Factor I (inactivates C3b) · CD59 (blocks C9 polymerisation)|Retrieval-Q3-Correct]]\n[[Properdin (stabilises C3bBb) · MASP-2 (cleaves C4) · C5a (chemoattractant)|Retrieval-Q3-Wrong-A]]\n[[DAF/CD55 only · Factor XII · Fibrinogen|Retrieval-Q3-Wrong-B]]\n[[C1INH (blocks MAC) · CD59 (cleaves C3b) · Factor H (activates C1q)|Retrieval-Q3-Wrong-C]]", "Retrieval-Q3-Correct": "<div class=\"section-label shared\">Retrieval Practice · 3 of 10</div>\n<div class=\"feedback-correct\"><strong>Correct.</strong></div>\n<div class=\"key-box\">\n<strong>C1INH</strong> — inhibits C1r, C1s (Classical), MASP-1, MASP-2 (Lectin) → blocks pathway initiation<br>\n<strong>Factor H + Factor I</strong> — Factor H brings Factor I to C3b; Factor I cleaves C3b → inactive iC3b → controls amplification<br>\n<strong>CD59</strong> — binds C5b-8, blocks C9 polymerisation → prevents MAC pore formation<br><br>\n(Also worth knowing: DAF/CD55 accelerates decay of C3 and C5 convertases; MCP/CD46 acts as cofactor for Factor I)\n</div>\n[[Next question →|Retrieval-Q4]]", "Retrieval-Q3-Wrong-A": "<div class=\"section-label shared\">Retrieval Practice · 3 of 10</div>\n<div class=\"feedback-incorrect\"><strong>None of these are regulatory proteins — they are pro-pathway components.</strong></div>\n<div class=\"key-box\">\n<strong>Properdin</strong> — positive regulator (stabilises the alternative C3 convertase) — not a regulatory protein in the protective sense<br>\n<strong>MASP-2</strong> — the effector enzyme of the lectin pathway<br>\n<strong>C5a</strong> — an anaphylatoxin/chemoattractant<br><br>\nKey regulatory proteins: <strong>C1INH</strong> (early), <strong>Factor H/I</strong> (mid), <strong>CD59</strong> (late/MAC)\n</div>\n[[Next question →|Retrieval-Q4]]", "Retrieval-Q3-Wrong-B": "<div class=\"section-label shared\">Retrieval Practice · 3 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Incomplete — and two of these are not regulatory proteins.</strong></div>\n<div class=\"key-box\">\n<strong>DAF/CD55</strong> is a genuine regulator (accelerates convertase decay) ✓ — but naming only one is incomplete<br>\n<strong>Factor XII</strong> — initiates the intrinsic/contact pathway, not a regulatory protein<br>\n<strong>Fibrinogen</strong> — a coagulation protein, entirely unrelated<br><br>\nKey regulators: <strong>C1INH</strong>, <strong>Factor H + Factor I</strong>, <strong>CD59</strong> (+ DAF/CD55, MCP/CD46)\n</div>\n[[Next question →|Retrieval-Q4]]", "Retrieval-Q3-Wrong-C": "<div class=\"section-label shared\">Retrieval Practice · 3 of 10</div>\n<div class=\"feedback-incorrect\"><strong>The names are right but the functions are wrong.</strong></div>\n<div class=\"key-box\">\n<strong>C1INH</strong> blocks C1r/C1s (and MASPs) — it acts at pathway <em>initiation</em>, not at the MAC<br>\n<strong>CD59</strong> blocks C9 polymerisation — it does not cleave C3b<br>\n<strong>Factor H</strong> competes with Factor B for C3b binding, accelerates C3bBb decay, and is a cofactor for Factor I — it does not activate C1q\n</div>\n[[Next question →|Retrieval-Q4]]", "Retrieval-Q4": "<div class=\"section-label shared\">Retrieval Practice · 4 of 10</div>\n<div class=\"progress-label\">Retrieval Practice · Question 4 of 10</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:40%\"></div></div>\n\n<h2>What are the three main effector outcomes of complement activation?</h2>\n<p><em>Name the outcome, the molecule responsible, and the mechanism.</em></p>\n\n[[Opsonisation (C3b tags pathogens for phagocytosis) · Inflammation (C3a/C5a are anaphylatoxins) · Lysis (MAC/C5b-9 forms a pore)|Retrieval-Q4-Correct]]\n[[Opsonisation (C5a) · Lysis (C3b) · Vasodilation (Factor B)|Retrieval-Q4-Wrong-A]]\n[[Antibody production (C1q) · Chemotaxis (C4b) · Phagocytosis (C9)|Retrieval-Q4-Wrong-B]]\n[[Opsonisation (C3b) · Inflammation (Factor H) · Lysis (C4b forms a pore)|Retrieval-Q4-Wrong-C]]", "Retrieval-Q4-Correct": "<div class=\"section-label shared\">Retrieval Practice · 4 of 10</div>\n<div class=\"feedback-correct\"><strong>Correct.</strong></div>\n<div class=\"key-box\">\n<strong>1. Opsonisation</strong> — C3b (and C4b) coat pathogen surfaces; phagocytes with CR1 receptors recognise and engulf them<br>\n<strong>2. Inflammation</strong> — C3a, C5a (and C4a) are anaphylatoxins: they degranulate mast cells, increase vascular permeability, and recruit neutrophils<br>\n<strong>3. Direct lysis</strong> — MAC (C5b-9) forms a transmembrane pore → osmotic disruption → cell lysis (especially effective against Gram-negative bacteria)\n</div>\n<div class=\"feedback-correct\" style=\"margin-top:.75rem\"><strong>Retrieval practice complete.</strong> If any of these felt uncertain, revisit those pathways — that effortful retrieval attempt is exactly what builds exam-ready memory.</div>\n[[Next question →|Retrieval-Q5]]", "Retrieval-Q4-Wrong-A": "<div class=\"section-label shared\">Retrieval Practice · 4 of 10</div>\n<div class=\"feedback-incorrect\"><strong>The outcomes are right but the molecules are wrong.</strong></div>\n<div class=\"key-box\">\n<strong>Opsonisation</strong> → <strong>C3b</strong> (not C5a — C5a is the anaphylatoxin/chemoattractant)<br>\n<strong>Inflammation</strong> → <strong>C3a and C5a</strong> (not C3b)<br>\n<strong>Lysis</strong> → <strong>MAC / C5b-9</strong> (not Factor B — Factor B is part of the alternative pathway convertase)\n</div>\n[[Next question →|Retrieval-Q5]]", "Retrieval-Q4-Wrong-B": "<div class=\"section-label shared\">Retrieval Practice · 4 of 10</div>\n<div class=\"feedback-incorrect\"><strong>These are not the effector outcomes of complement activation.</strong></div>\n<div class=\"key-box\">\nComplement does not directly produce antibodies (that's adaptive immunity) or activate phagocytosis via C1q or C9.<br><br>\nThe three main effector outcomes are:<br>\n<strong>1. Opsonisation</strong> — C3b coats pathogens for phagocytosis<br>\n<strong>2. Inflammation</strong> — C3a and C5a are anaphylatoxins<br>\n<strong>3. Lysis</strong> — MAC (C5b-9) forms a lytic pore\n</div>\n[[Next question →|Retrieval-Q5]]", "Retrieval-Q4-Wrong-C": "<div class=\"section-label shared\">Retrieval Practice · 4 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Partially right, but with errors.</strong></div>\n<div class=\"key-box\">\n<strong>Opsonisation by C3b</strong> ✓<br>\n<strong>Inflammation</strong> → driven by <strong>C3a and C5a</strong> (anaphylatoxins), not Factor H (which is a regulatory protein)<br>\n<strong>Lysis</strong> → the <strong>MAC (C5b-9)</strong> forms the pore — C4b is an opsonin, not lytic\n</div>\n[[Next question →|Retrieval-Q5]]", "Retrieval-Q5": "<div class=\"section-label shared\">Retrieval Practice \u00b7 5 of 10</div>\n<div class=\"progress-label\">Retrieval Practice \u00b7 Question 5 of 10</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:50%\"></div></div>\n\n<h2>What does MASP-2 cleave in the Lectin pathway, and what does this generate?</h2>\n<p><em>Think about how the Lectin pathway converges with the Classical pathway.</em></p>\n\n[[MASP-2 cleaves C4 and C2, generating C4b2a \u2014 the same C3 convertase as the Classical pathway|Retrieval-Q5-Correct]]\n[[MASP-2 cleaves C3 directly into C3a and C3b, bypassing a convertase|Retrieval-Q5-Wrong-A]]\n[[MASP-2 cleaves Factor B and Factor D to generate the alternative C3 convertase C3bBb|Retrieval-Q5-Wrong-B]]\n[[MASP-2 cleaves C1q, recruiting C1r and C1s to activate the Classical pathway|Retrieval-Q5-Wrong-C]]", "Retrieval-Q5-Correct": "<div class=\"section-label shared\">Retrieval Practice \u00b7 5 of 10</div>\n<div class=\"feedback-correct\"><strong>Correct.</strong></div>\n<div class=\"key-box\">\n<strong>MASP-2</strong> is activated when MBL or Ficolins bind microbial carbohydrates \u2192 cleaves <strong>C4</strong> \u2192 C4a + C4b, then cleaves <strong>C2</strong> \u2192 C2a + C2b.<br><br>\nC4b + C2a = <strong>C4b2a</strong> \u2014 identical to the Classical pathway C3 convertase.<br>\nThis is why the Lectin and Classical pathways share all downstream steps.\n</div>\n[[Next question \u2192|Retrieval-Q6]]", "Retrieval-Q5-Wrong-A": "<div class=\"section-label shared\">Retrieval Practice \u00b7 5 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Not quite.</strong></div>\n<div class=\"key-box\">\nMASP-2 does not cleave C3 directly. It cleaves <strong>C4</strong> and <strong>C2</strong> to assemble the C3 convertase <strong>C4b2a</strong>, which then cleaves C3.<br>\nThis two-step design allows regulation at the convertase level before C3 amplification begins.\n</div>\n[[Next question \u2192|Retrieval-Q6]]", "Retrieval-Q5-Wrong-B": "<div class=\"section-label shared\">Retrieval Practice \u00b7 5 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Not quite \u2014 those belong to a different pathway.</strong></div>\n<div class=\"key-box\">\nFactor B and Factor D are components of the <strong>Alternative pathway</strong>, not the Lectin pathway.<br>\nMASP-2 acts within the Lectin pathway, cleaving <strong>C4</strong> and <strong>C2</strong> to generate <strong>C4b2a</strong>.\n</div>\n[[Next question \u2192|Retrieval-Q6]]", "Retrieval-Q5-Wrong-C": "<div class=\"section-label shared\">Retrieval Practice \u00b7 5 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Not quite \u2014 that describes the Classical pathway.</strong></div>\n<div class=\"key-box\">\nC1q is the pattern recognition molecule of the <strong>Classical pathway</strong> \u2014 it recognises antibody Fc regions.<br>\nMASP-2 is the Lectin pathway effector enzyme; it acts on <strong>C4 and C2</strong> after MBL/Ficolin binding, generating <strong>C4b2a</strong>.\n</div>\n[[Next question \u2192|Retrieval-Q6]]", "Retrieval-Q6": "<div class=\"section-label shared\">Retrieval Practice \u00b7 6 of 10</div>\n<div class=\"progress-label\">Retrieval Practice \u00b7 Question 6 of 10</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:60%\"></div></div>\n\n<h2>What is the role of Properdin (Factor P) in the Alternative pathway, and why is it unique among complement regulators?</h2>\n<p><em>Think about C3 convertase stability and what makes Properdin unusual.</em></p>\n\n[[Properdin stabilises C3bBb on microbial surfaces, extending its half-life; it is the only known positive regulator of complement|Retrieval-Q6-Correct]]\n[[Properdin cleaves Factor B to generate Bb, directly forming the alternative C3 convertase|Retrieval-Q6-Wrong-A]]\n[[Properdin degrades C3b to iC3b, limiting alternative pathway amplification on host cells|Retrieval-Q6-Wrong-B]]\n[[Properdin is the pattern recognition molecule that initiates the Alternative pathway by binding LPS|Retrieval-Q6-Wrong-C]]", "Retrieval-Q6-Correct": "<div class=\"section-label shared\">Retrieval Practice \u00b7 6 of 10</div>\n<div class=\"feedback-correct\"><strong>Correct.</strong></div>\n<div class=\"key-box\">\nC3bBb has a very short half-life (~1.5 min) without stabilisation.<br>\n<strong>Properdin (Factor P)</strong> binds C3bBb \u2192 <strong>C3bBbP</strong>, extending half-life 5\u201310-fold and massively amplifying C3 cleavage on the pathogen surface.<br><br>\nProperdin is the <strong>only known positive regulator</strong> of complement \u2014 all others (Factor H, DAF, C1INH, CD59) are inhibitory.\n</div>\n[[Next question \u2192|Retrieval-Q7]]", "Retrieval-Q6-Wrong-A": "<div class=\"section-label shared\">Retrieval Practice \u00b7 6 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Not quite \u2014 that is Factor D's role.</strong></div>\n<div class=\"key-box\">\n<strong>Factor D</strong> is the enzyme that cleaves Factor B (once bound to C3b) \u2192 Ba + Bb.<br>\n<strong>Properdin</strong> acts downstream: it binds the already-formed C3bBb complex, stabilising it and extending its half-life.\n</div>\n[[Next question \u2192|Retrieval-Q7]]", "Retrieval-Q6-Wrong-B": "<div class=\"section-label shared\">Retrieval Practice \u00b7 6 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Not quite \u2014 that is the role of Factor I.</strong></div>\n<div class=\"key-box\">\n<strong>Factor I</strong> (with Factor H as cofactor) cleaves C3b \u2192 iC3b, terminating amplification on host surfaces.<br>\n<strong>Properdin</strong> does the opposite \u2014 it stabilises C3bBb, <em>promoting</em> amplification, making it the only known <strong>positive</strong> regulator of complement.\n</div>\n[[Next question \u2192|Retrieval-Q7]]", "Retrieval-Q6-Wrong-C": "<div class=\"section-label shared\">Retrieval Practice \u00b7 6 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Not quite \u2014 the Alternative pathway has no pattern recognition molecule.</strong></div>\n<div class=\"key-box\">\nThe Alternative pathway is initiated by <strong>spontaneous C3 tick-over</strong> (hydrolysis of C3 in plasma) \u2014 no receptor or pattern recognition is required.<br>\n<strong>Properdin</strong> acts downstream, stabilising C3bBb on pathogen surfaces to amplify the response.\n</div>\n[[Next question \u2192|Retrieval-Q7]]", "Retrieval-Q7": "<div class=\"section-label shared\">Retrieval Practice \u00b7 7 of 10</div>\n<div class=\"progress-label\">Retrieval Practice \u00b7 Question 7 of 10</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:70%\"></div></div>\n\n<h2>In what order do the MAC components assemble after C5 cleavage, and how does the complex kill cells?</h2>\n<p><em>Name the sequence of components and the mechanism of cell death.</em></p>\n\n[[C5b binds C6 \u2192 C7 (membrane insertion) \u2192 C8 \u2192 C9 polymerises (18–22 copies) \u2192 transmembrane pore \u2192 osmotic lysis|Retrieval-Q7-Correct]]\n[[C5a binds C6, then C7\u2013C8 assemble, and C9 inserts as a single unit to puncture the membrane|Retrieval-Q7-Wrong-A]]\n[[C5b-9 assembles completely in the fluid phase as a pre-formed pore, then inserts into the membrane|Retrieval-Q7-Wrong-B]]\n[[C5b binds C8 first, then C7, then C6, and C9 inserts as a single monomer|Retrieval-Q7-Wrong-C]]", "Retrieval-Q7-Correct": "<div class=\"section-label shared\">Retrieval Practice \u00b7 7 of 10</div>\n<div class=\"feedback-correct\"><strong>Correct.</strong></div>\n<div class=\"key-box\">\n<strong>C5b</strong> + C6 + C7 \u2192 C5b-7 complex inserts into the lipid bilayer<br>\n<strong>C8</strong> binds \u2192 deepens membrane penetration<br>\n<strong>C9</strong> is recruited and polymerises (typically 18â22 copies) \u2192 transmembrane channel<br><br>\nWater and ions flood in \u2192 osmotic lysis. Particularly effective against Gram-negative bacteria; less so against Gram-positive (thick peptidoglycan).\n</div>\n[[Next question \u2192|Retrieval-Q8]]", "Retrieval-Q7-Wrong-A": "<div class=\"section-label shared\">Retrieval Practice \u00b7 7 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Not quite \u2014 C5a is released, not assembled into the MAC.</strong></div>\n<div class=\"key-box\">\n<strong>C5a</strong> is the anaphylatoxin fragment released into solution \u2014 it does not form part of the MAC.<br>\nIt is <strong>C5b</strong> that remains at the surface and recruits C6 \u2192 C7 (membrane insertion) \u2192 C8 \u2192 multiple C9 molecules which polymerise to form the pore.\n</div>\n[[Next question \u2192|Retrieval-Q8]]", "Retrieval-Q7-Wrong-B": "<div class=\"section-label shared\">Retrieval Practice \u00b7 7 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Not quite \u2014 assembly occurs sequentially on the membrane surface.</strong></div>\n<div class=\"key-box\">\nThe MAC does not pre-assemble in the fluid phase \u2014 key insertion steps happen during sequential assembly on the membrane:<br>\nC5b-7 <strong>inserts into the bilayer</strong>; C8 deepens penetration; C9 polymerises on the membrane to complete the pore.<br>\nFluid-phase assembly would be dangerous \u2014 it would attack any nearby host cell indiscriminately.\n</div>\n[[Next question \u2192|Retrieval-Q8]]", "Retrieval-Q7-Wrong-C": "<div class=\"section-label shared\">Retrieval Practice \u00b7 7 of 10</div>\n<div class=\"feedback-incorrect\"><strong>The order and C9 copy number are wrong.</strong></div>\n<div class=\"key-box\">\nCorrect order: C5b \u2192 C6 \u2192 <strong>C7</strong> (inserts into membrane) \u2192 C8 \u2192 C9 (polymerises).<br>\nC6 binds C5b before C7 or C8. C9 polymerises in <strong>multiple copies (~18)</strong> to form the transmembrane channel \u2014 not as a single monomer.\n</div>\n[[Next question \u2192|Retrieval-Q8]]", "Retrieval-Q8": "<div class=\"section-label shared\">Retrieval Practice \u00b7 8 of 10</div>\n<div class=\"progress-label\">Retrieval Practice \u00b7 Question 8 of 10</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:80%\"></div></div>\n\n<h2>What are the C5 convertases of the Classical/Lectin and Alternative pathways, and what do they produce?</h2>\n<p><em>How do C5 convertases differ structurally from C3 convertases? What are the two products?</em></p>\n\n[[Classical/Lectin: C4b2a3b \u00b7 Alternative: C3bBb3bP \u00b7 Both cleave C5 \u2192 C5a (anaphylatoxin) + C5b (initiates MAC)|Retrieval-Q8-Correct]]\n[[Classical/Lectin: C4b2a \u00b7 Alternative: C3bBb \u00b7 They are the same as C3 convertases but act on C5 at higher substrate concentrations|Retrieval-Q8-Wrong-A]]\n[[All three pathways converge on a single universal C5 convertase formed when C3b binds Factor D|Retrieval-Q8-Wrong-B]]\n[[Classical/Lectin: C4b2a3b \u00b7 Alternative: C3bBb3bP \u00b7 Both cleave C5 \u2192 C5a (activates CD59) + C5b (opsonin)|Retrieval-Q8-Wrong-C]]", "Retrieval-Q8-Correct": "<div class=\"section-label shared\">Retrieval Practice \u00b7 8 of 10</div>\n<div class=\"feedback-correct\"><strong>Correct.</strong></div>\n<div class=\"key-box\">\nC3 convertase + an additional C3b = C5 convertase (the extra C3b shifts substrate specificity from C3 to C5):<br>\n<strong>Classical/Lectin:</strong> C4b2a + C3b \u2192 <strong>C4b2a3b</strong><br>\n<strong>Alternative:</strong> C3bBbP + C3b \u2192 <strong>C3bBb3bP</strong><br><br>\nProducts: <strong>C5a</strong> (anaphylatoxin/chemoattractant) + <strong>C5b</strong> (binds C6 to initiate MAC assembly)\n</div>\n[[Next question \u2192|Retrieval-Q9]]", "Retrieval-Q8-Wrong-A": "<div class=\"section-label shared\">Retrieval Practice \u00b7 8 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Not quite \u2014 C3 and C5 convertases are structurally distinct.</strong></div>\n<div class=\"key-box\">\nC3 convertases (<strong>C4b2a</strong> and <strong>C3bBbP</strong>) cannot cleave C5 \u2014 substrate specificity changes when an extra C3b binds:<br>\nC4b2a + C3b \u2192 <strong>C4b2a3b</strong> (cleaves C5)<br>\nC3bBbP + C3b \u2192 <strong>C3bBb3bP</strong> (cleaves C5)<br>\nThis is not simply about substrate concentration \u2014 the additional C3b fundamentally alters the complex.\n</div>\n[[Next question \u2192|Retrieval-Q9]]", "Retrieval-Q8-Wrong-B": "<div class=\"section-label shared\">Retrieval Practice \u00b7 8 of 10</div>\n<div class=\"feedback-incorrect\"><strong>There is no single universal C5 convertase.</strong></div>\n<div class=\"key-box\">\nEach pathway generates its own C5 convertase by adding <strong>C3b</strong> to its own C3 convertase:<br>\n<strong>Classical/Lectin:</strong> C4b2a3b<br>\n<strong>Alternative:</strong> C3bBb3bP<br><br>\nFactor D is an Alternative pathway enzyme that cleaves Factor B \u2014 it is not involved in C5 convertase formation.\n</div>\n[[Next question \u2192|Retrieval-Q9]]", "Retrieval-Q8-Wrong-C": "<div class=\"section-label shared\">Retrieval Practice \u00b7 8 of 10</div>\n<div class=\"feedback-incorrect\"><strong>The convertase names are right, but the products are wrong.</strong></div>\n<div class=\"key-box\">\n<strong>C5a</strong> activates mast cells, basophils, and neutrophils (anaphylatoxin/chemoattractant) \u2014 it does not activate CD59.<br>\n<strong>C5b</strong> is not an opsonin \u2014 it initiates MAC (C5b-9) assembly by binding C6.<br>\nCD59 (Protectin) is a MAC inhibitor that blocks C9 polymerisation.\n</div>\n[[Next question \u2192|Retrieval-Q9]]", "Retrieval-Q9": "<div class=\"section-label shared\">Retrieval Practice \u00b7 9 of 10</div>\n<div class=\"progress-label\">Retrieval Practice \u00b7 Question 9 of 10</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:90%\"></div></div>\n\n<h2>How do Factor H and Factor I co-operate to regulate the Alternative pathway on host cells?</h2>\n<p><em>Think about how the body distinguishes self from non-self at the C3b level.</em></p>\n\n[[Factor H binds C3b on host surfaces (recognising self-markers), displacing Bb and acting as cofactor for Factor I, which cleaves C3b \u2192 inactive iC3b|Retrieval-Q9-Correct]]\n[[Factor H binds Properdin on C3bBbP to block amplification; Factor I then destroys the intact C3 convertase|Retrieval-Q9-Wrong-A]]\n[[Factor H is a serpin that inhibits Factor D in the fluid phase; Factor I cleaves C3 before it can deposit on cells|Retrieval-Q9-Wrong-B]]\n[[Factor H and Factor I both bind MBL on host cells to prevent Lectin pathway activation|Retrieval-Q9-Wrong-C]]", "Retrieval-Q9-Correct": "<div class=\"section-label shared\">Retrieval Practice \u00b7 9 of 10</div>\n<div class=\"feedback-correct\"><strong>Correct.</strong></div>\n<div class=\"key-box\">\nHost cell surfaces display <strong>self-markers</strong> (sialic acid, polyanions) that Factor H recognises:<br>\n<strong>Factor H</strong> binds C3b \u2192 competes with Factor B, accelerates Bb dissociation, and acts as <strong>cofactor for Factor I</strong>.<br>\n<strong>Factor I</strong> cleaves C3b \u2192 <strong>iC3b</strong> (inactive; cannot reform a convertase, but still an opsonin via CR3/CR4).<br><br>\nPathogens lack these self-markers \u2192 Factor H cannot bind \u2192 C3bBb persists \u2192 amplification continues unchecked.\n</div>\n[[Next question \u2192|Retrieval-Q10]]", "Retrieval-Q9-Wrong-A": "<div class=\"section-label shared\">Retrieval Practice \u00b7 9 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Not quite \u2014 Factor H does not target Properdin.</strong></div>\n<div class=\"key-box\">\n<strong>Properdin</strong> stabilises C3bBb; Factor H does not bind it directly.<br>\nInstead, <strong>Factor H</strong> competes with Factor B for C3b binding and <strong>accelerates Bb dissociation</strong>, then acts as cofactor for Factor I.<br>\n<strong>Factor I</strong> cleaves C3b \u2192 iC3b, removing the platform on which Properdin could act.\n</div>\n[[Next question \u2192|Retrieval-Q10]]", "Retrieval-Q9-Wrong-B": "<div class=\"section-label shared\">Retrieval Practice \u00b7 9 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Neither statement is correct.</strong></div>\n<div class=\"key-box\">\n<strong>Factor H</strong> is not a serpin. It is a regulatory glycoprotein that binds <strong>surface-deposited C3b</strong> (not Factor D).<br>\n<strong>Factor I</strong> cleaves <strong>surface-bound C3b</strong> \u2014 not fluid-phase C3. It requires cofactors (Factor H, MCP, CR1) to act.<br>\nThis surface-specificity is what allows complement to spare host cells while attacking pathogens.\n</div>\n[[Next question \u2192|Retrieval-Q10]]", "Retrieval-Q9-Wrong-C": "<div class=\"section-label shared\">Retrieval Practice \u00b7 9 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Not quite \u2014 Factor H and Factor I act on the Alternative pathway, not the Lectin pathway.</strong></div>\n<div class=\"key-box\">\n<strong>MBL</strong> is a Lectin pathway pattern recognition molecule \u2014 it is regulated via C1INH (which inhibits MASPs).<br>\n<strong>Factor H</strong> and <strong>Factor I</strong> regulate the <strong>Alternative pathway</strong> by binding and inactivating <strong>C3b</strong> on host cell surfaces.\n</div>\n[[Next question \u2192|Retrieval-Q10]]", "Retrieval-Q10": "<div class=\"section-label shared\">Retrieval Practice \u00b7 10 of 10</div>\n<div class=\"progress-label\">Retrieval Practice \u00b7 Question 10 of 10</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:100%\"></div></div>\n\n<h2>Name one condition caused by deficiency of a complement regulatory protein and explain the underlying mechanism.</h2>\n<p><em>Think about what happens when a regulatory brake is removed.</em></p>\n\n[[Hereditary Angioedema (C1INH deficiency): uncontrolled kallikrein \u2192 excess bradykinin \u2192 episodic tissue swelling. OR PNH (CD55/CD59 loss): MAC attacks host RBCs \u2192 haemolysis|Retrieval-Q10-Correct]]\n[[SLE: caused by excess C1q leading to overactive complement that destroys host tissue|Retrieval-Q10-Wrong-A]]\n[[Selective IgA deficiency: C3 convertase overactivity consumes immunoglobulins, leaving patients antibody-depleted|Retrieval-Q10-Wrong-B]]\n[[Recurrent Staphylococcal infections: C5\u2013C9 deficiency prevents MAC formation against Gram-positive bacteria|Retrieval-Q10-Wrong-C]]", "Retrieval-Q10-Correct": "<div class=\"section-label shared\">Retrieval Practice \u00b7 10 of 10</div>\n<div class=\"feedback-correct\"><strong>Correct.</strong></div>\n<div class=\"key-box\">\n<strong>HAE (Hereditary Angioedema):</strong> C1INH deficiency \u2192 uncontrolled kallikrein \u2192 bradykinin excess \u2192 episodic swelling of skin and mucosa (laryngeal oedema can be life-threatening)<br><br>\n<strong>PNH (Paroxysmal Nocturnal Haemoglobinuria):</strong> PIGA gene mutation \u2192 failure of GPI anchor synthesis \u2192 CD55 and CD59 lost from RBC surfaces \u2192 MAC-mediated haemolysis<br><br>\nAlso: <strong>C3 deficiency</strong> \u2192 recurrent encapsulated bacterial infections (no opsonisation); <strong>C5\u2013C9 deficiency</strong> \u2192 recurrent Neisseria infections (no MAC).\n</div>\n[[See your results →|Retrieval-Results]]", "Retrieval-Q10-Wrong-A": "<div class=\"section-label shared\">Retrieval Practice \u00b7 10 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Not quite \u2014 SLE is caused by C1q <em>deficiency</em>, not excess.</strong></div>\n<div class=\"key-box\">\n<strong>SLE</strong> is linked to <em>deficiency</em> of early classical pathway components (C1q, C2, C4). The mechanism is <strong>impaired clearance</strong> of apoptotic debris and immune complexes \u2014 not overactive complement. Without C1q, complexes accumulate in tissues \u2192 autoantigen exposure \u2192 autoimmunity.<br><br>\nFor <strong>regulatory protein</strong> deficiency: <strong>C1INH deficiency \u2192 HAE</strong> (excess bradykinin \u2192 episodic tissue swelling) or <strong>CD55/CD59 loss (PIGA mutation) \u2192 PNH</strong> (unregulated MAC attacks host RBCs \u2192 haemolysis).\n</div>\n[[See your results →|Retrieval-Results]]", "Retrieval-Q10-Wrong-B": "<div class=\"section-label shared\">Retrieval Practice \u00b7 10 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Not quite \u2014 selective IgA deficiency is unrelated to complement regulation.</strong></div>\n<div class=\"key-box\">\n<strong>Selective IgA deficiency</strong> is a primary antibody deficiency \u2014 a B-cell isotype class-switching disorder, not related to complement.<br><br>\nA complement regulatory deficiency: <strong>C1INH deficiency \u2192 HAE</strong> (episodic swelling from excess bradykinin) or <strong>CD55/CD59 loss \u2192 PNH</strong> (unregulated MAC attacks host RBCs).\n</div>\n[[See your results →|Retrieval-Results]]", "Retrieval-Q10-Wrong-C": "<div class=\"section-label shared\">Retrieval Practice \u00b7 10 of 10</div>\n<div class=\"feedback-incorrect\"><strong>Partially right idea, but the pathogen type is wrong.</strong></div>\n<div class=\"key-box\">\nC5\u2013C9 (MAC) deficiency does cause susceptibility to bacterial infection \u2014 but to <strong>Gram-negative</strong> bacteria, especially <em>Neisseria meningitidis</em> and <em>N. gonorrhoeae</em>.<br>\n<strong>Staphylococci</strong> are Gram-positive with a thick peptidoglycan wall that resists MAC \u2014 they are cleared by opsonisation and phagocytosis.<br><br>\nAlso note: C5\u2013C9 deficiency is a <em>terminal component</em> deficiency, not a regulatory protein deficiency.\n</div>\n[[See your results →|Retrieval-Results]]"};

let current = "Start-Complement";

// ── Analytics (Google Apps Script → Google Sheets) ────────────────────────────
const ANALYTICS_URL = 'https://script.google.com/macros/s/AKfycbwO0n5NwJJciNi-RF577OwGP5Q2kFwEMDX6lMG7cnC7ye4-zaPYll7gKRLAM9ngVP1K/exec';

let _studentId   = null;
let _sessionId   = null;
let _sessStart   = null;
let _lastPassage = null;
let _lastPTime   = null;
let _pCount      = 0;
let _evtQ        = [];
let _flushTimer  = null;

function _gSid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}
function _q(type, data) {
    if (!_studentId) return;
    _evtQ.push(Object.assign({ type, studentId:_studentId, sessionId:_sessionId,
        ts: new Date().toISOString() }, data || {}));
    clearTimeout(_flushTimer);
    _flushTimer = setTimeout(_flush, 1500);
}
function _flush(sync) {
    if (!_evtQ.length || !ANALYTICS_URL || ANALYTICS_URL.startsWith('PASTE')) return;
    const batch = _evtQ.splice(0);
    const body  = JSON.stringify({ events: batch });
    if (sync && navigator.sendBeacon) {
        navigator.sendBeacon(ANALYTICS_URL, body);
    } else {
        fetch(ANALYTICS_URL, { method:'POST', mode:'no-cors', body, keepalive:true })
            .catch(() => _evtQ.unshift(...batch));
    }
}
function analyticsInit(code) {
    _studentId  = code;
    _sessionId  = _gSid();
    _sessStart  = Date.now();
    _lastPTime  = Date.now();
    _q('session_start', {
        ua:     navigator.userAgent,
        screen: screen.width + 'x' + screen.height,
        lang:   navigator.language,
        tz:     (typeof Intl !== 'undefined') ? Intl.DateTimeFormat().resolvedOptions().timeZone : ''
    });
    window.addEventListener('beforeunload', () => {
        _q('session_end', {
            durationSec:    Math.round((Date.now() - _sessStart) / 1000),
            passagesViewed: _pCount
        });
        _flush(true);
    });
}
function analyticsView(name) {
    const now = Date.now();
    if (_lastPassage !== null) {
        _q('passage_exit', { passage: _lastPassage,
            durationSec: Math.round((now - _lastPTime) / 1000) });
    }
    _pCount++;
    _lastPassage = name;
    _lastPTime   = now;
    _q('passage_enter', { passage: name, seq: _pCount });
}
function analyticsAnswer(fromPassage, toPassage, answerText) {
    _q('answer', {
        question: fromPassage,
        answer:   (answerText || '').trim().slice(0, 300),
        dest:     toPassage,
        correct:  /-Correct$/.test(toPassage)
    });
}
function analyticsMCQ(score, total) {
    _q('mcq_result', { score, total, pct: Math.round(score/total*100) });
}
// ─────────────────────────────────────────────────────────────────────────────

let history = [];
let retrievalScore = 0;

function attachLinkHandlers() {
    document.querySelectorAll(".link-internal").forEach(el => {
        el.addEventListener("click", e => {
            e.preventDefault();
            const target = el.getAttribute("data-target");
            if (target) {
                // Score tracking
                if (target === 'Retrieval-Intro') { retrievalScore = 0; }
                if (/^Retrieval-Q\d+-Correct$/.test(target)) { retrievalScore++; }
                analyticsAnswer(current, target, el.textContent);
                history.push(current);
                current = target;
                renderPassage(current);
            }
        });
    });
}

function renderPassage(name, addToHistory) {
    analyticsView(name);

    // ── Item 3: Track pathway completion ────────────────────────────
    const PATHWAY_KEYS = {
        'Classical-Intro': 'classical',
        'Alternative-Intro': 'alternative',
        'Lectin-Intro': 'lectin',
        'Regulation-Intro': 'regulation'
    };
    if (PATHWAY_KEYS[name]) {
        try { sessionStorage.setItem('visited_' + PATHWAY_KEYS[name], '1'); } catch(e) {}
    }

    // ── Item 15: Show skeleton loader ───────────────────────────────
    document.getElementById("passage-container").innerHTML =
        '<div class="skeleton-loader">' +
        '<div class="skeleton-line" style="width:40%;height:.7em"></div>' +
        '<div class="skeleton-line" style="width:80%;height:1.4em;margin-top:1rem"></div>' +
        '<div class="skeleton-line" style="width:95%"></div>' +
        '<div class="skeleton-line" style="width:88%"></div>' +
        '<div class="skeleton-line" style="width:72%"></div>' +
        '</div>';

    requestAnimationFrame(function() {
    requestAnimationFrame(function() {

    // ── Special case: dynamic results page ──────────────────────────
    if (name === 'Retrieval-Results') {
        const pct = Math.round(retrievalScore / 10 * 100);
        const scoreColor = pct >= 60 ? '#27a85f' : '#c0392b';
        let feedbackClass, feedbackMsg, retryBtn = '';
        if (pct >= 80) {
            feedbackClass = 'feedback-correct';
            feedbackMsg = '<strong>Excellent!</strong> ' + pct + '% — outstanding recall. You have a strong command of all four pathways, their regulation, and clinical applications. Well done.';
        } else if (pct >= 60) {
            feedbackClass = 'feedback-correct';
            feedbackMsg = '<strong>Good work!</strong> ' + pct + '% — solid understanding, but aim for 80% or above. Review the questions you missed, revisit those pathway steps, then try again.';
        } else {
            feedbackClass = 'feedback-incorrect';
            feedbackMsg = '<strong>Score: ' + pct + '% — keep working.</strong> Complement is a complex system. Work back through the pathways carefully, then retry. The act of retrieval itself builds memory even when you get answers wrong.';
            retryBtn = '<a class="link-internal" href="#" data-target="Retrieval-Intro" style="display:inline-block;margin-top:.75rem;padding:.5rem 1.1rem;background:#e8f9ef;border:1.5px solid #27a85f;border-radius:9px;color:#0d4a2e;font-weight:600;text-decoration:none;">🔄 Try again</a>&nbsp;&nbsp;';
        }
        analyticsMCQ(retrievalScore, 10);

        // ── Item 10: SVG score ring ──────────────────────────────────
        const R = 52, C = 2 * Math.PI * R;
        const dash = (pct / 100) * C;
        const gap  = C - dash;
        const ringColor = pct >= 80 ? '#27a85f' : pct >= 60 ? '#f0a030' : '#e05a2b';
        const scoreRing = `<div class="score-ring">
          <svg width="130" height="130" viewBox="0 0 130 130">
            <circle cx="65" cy="65" r="${R}" fill="none" stroke="#e8eaef" stroke-width="10"/>
            <circle cx="65" cy="65" r="${R}" fill="none" stroke="${ringColor}" stroke-width="10"
              stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}"
              stroke-linecap="round"
              transform="rotate(-90 65 65)"/>
            <text x="65" y="60" text-anchor="middle" font-size="22" font-weight="700"
              fill="${ringColor}">${retrievalScore}/10</text>
            <text x="65" y="82" text-anchor="middle" font-size="14" fill="#888">${pct}%</text>
          </svg>
        </div>`;

        document.getElementById("passage-container").innerHTML = `<div class="passage">
            <div class="section-label shared">MCQ Results</div>
            <h2>Your Score</h2>
            ${scoreRing}
            <div class="${feedbackClass}" style="margin-top:.5rem">${feedbackMsg}</div>
            <p style="margin-top:1.25rem">${retryBtn}<a class="link-internal" href="#" data-target="Start-Complement" style="display:inline-block;padding:.5rem 1.1rem;background:#f0f3ff;border:1.5px solid #c8d1fa;border-radius:9px;color:#1e2d7a;font-weight:500;text-decoration:none;">← Return to main menu</a></p>
        </div>`;
        window.scrollTo(0, 0);
        attachLinkHandlers();
        return;
    }

    const body = PASSAGES[name];
    if (!body) {
        document.getElementById("passage-container").innerHTML = "<p>Passage not found: " + name + "</p>";
        return;
    }
    let html = body;

    // ── Items 2 & 8: Styled link classes ────────────────────────────
    html = html.replace(/\[\[([^\|\]]+?)\|([^\]]+?)\]\]/g, (_, display, target) => {
        let cls = 'link-internal';
        if (/-(Correct|Wrong-[ABC])$/.test(target)) cls += ' link-answer';
        else if (/Continue|→/.test(display) && !/(Back|Return|Menu|Home)/i.test(display)) cls += ' link-continue';
        return `<a class="${cls}" href="#" data-target="${escapeAttr(target)}">${display}</a>`;
    });
    html = html.replace(/\[\[([^\]]+?)\]\]/g, (_, target) => {
        return `<a class="link-internal" href="#" data-target="${escapeAttr(target)}">${target}</a>`;
    });
    html = html.replace(/\'\'/g, "");

    // ── Item 5: Back button on ALL passages (including wrong-answer) ─
    if (history.length > 0) {
        html += `<br><a class="back-btn" id="back-btn">&#8592; Back</a>`;
    }

    document.getElementById("passage-container").innerHTML = `<div class="passage">${html}</div>`;

    // ── Item 1: Wrap clinical tables for mobile scroll ───────────────
    document.querySelectorAll('#passage-container .clinical-table').forEach(t => {
        if (!t.parentElement.classList.contains('table-scroll')) {
            const wrap = document.createElement('div');
            wrap.className = 'table-scroll';
            t.parentNode.insertBefore(wrap, t);
            wrap.appendChild(t);
        }
    });

    // ── Item 3: Inject completion badges on home page ────────────────
    if (name === 'Start-Complement') {
        const badges = { classical:'Classical-Intro', alternative:'Alternative-Intro',
                         lectin:'Lectin-Intro', regulation:'Regulation-Intro' };
        try {
            document.querySelectorAll('#passage-container a.link-internal').forEach(a => {
                const tgt = a.getAttribute('data-target');
                for (const [key, intro] of Object.entries(badges)) {
                    if (tgt === intro && sessionStorage.getItem('visited_' + key)) {
                        const badge = document.createElement('span');
                        badge.textContent = ' ✓';
                        badge.style.cssText = 'color:#27a85f;font-weight:700;font-size:1em;';
                        a.appendChild(badge);
                    }
                }
            });
        } catch(e) {}
    }

    window.scrollTo(0, 0);
    attachLinkHandlers();

    const backBtn = document.getElementById("back-btn");
    if (backBtn) {
        backBtn.addEventListener("click", e => {
            e.preventDefault();
            const prev = history.pop();
            if (prev) { current = prev; renderPassage(current); }
        });
    }

    }); // end rAF inner
    }); // end rAF outer
}

function escapeAttr(s) {
    return s.replace(/&/g,"&amp;").replace(/"/g,"&quot;");
}

// ── Show modal first; start activity after student enters code ─────
(function() {
    document.getElementById('story').style.display = 'none';
    const modal = document.getElementById('student-modal');
    const input = document.getElementById('sid-input');
    const err   = document.getElementById('sid-errtxt');
    const btn   = document.getElementById('sid-btn');

    // ── Item 14: Focus trap within modal ────────────────────────────
    const focusableSelectors = 'input, button, [tabindex]:not([tabindex="-1"])';
    modal.addEventListener('keydown', function(e) {
        if (e.key !== 'Tab') return;
        const focusable = Array.from(modal.querySelectorAll(focusableSelectors)).filter(el => !el.disabled);
        if (!focusable.length) return;
        const first = focusable[0], last = focusable[focusable.length - 1];
        if (e.shiftKey) {
            if (document.activeElement === first) { e.preventDefault(); last.focus(); }
        } else {
            if (document.activeElement === last) { e.preventDefault(); first.focus(); }
        }
    });

    function submit() {
        const val = input.value.replace(/\D/g,'');
        if (val.length !== 5) {
            input.classList.add('sid-error');
            err.textContent = 'Please enter exactly 5 digits.';
            setTimeout(() => input.classList.remove('sid-error'), 500);
            return;
        }
        err.textContent = '';
        modal.style.display = 'none';
        document.getElementById('story').style.display = '';
        analyticsInit(val);
        renderPassage("Start-Complement");
    }

    btn.addEventListener('click', submit);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    input.addEventListener('input', () => { input.value = input.value.replace(/\D/g,'').slice(0,5); });
    setTimeout(() => input.focus(), 150);
})();
</script>
