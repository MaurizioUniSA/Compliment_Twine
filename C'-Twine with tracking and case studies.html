<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Complement System — Interactive Pathway Learning Activity</title>
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: #f4f5f9;
    color: #1a1a2e;
    font-size: clamp(15px, 2vw, 17px);
    line-height: 1.75;
    min-height: 100vh;
}

#story {
    max-width: 760px;
    margin: 0 auto;
    padding: 1.5rem 1rem 4rem;
}

.passage {
    background: #ffffff;
    border-radius: 14px;
    padding: 2rem 2.25rem;
    box-shadow: 0 2px 16px rgba(30,40,100,0.08);
    border: 1px solid #e4e8f0;
    animation: fadeSlide 0.3s ease;
}
@keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
}

h1 {
    font-size: 1.65rem;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 1rem;
    line-height: 1.25;
}
h2 {
    font-size: 1.2rem;
    font-weight: 600;
    color: #1e2d7a;
    margin-bottom: 0.85rem;
    padding-bottom: 0.4rem;
    border-bottom: 2px solid #eaecf8;
}
h3 {
    font-size: 1.05rem;
    font-weight: 600;
    color: #2d3a8c;
    margin-bottom: 0.6rem;
}

p {
    margin-bottom: 0.9rem;
}
p:last-child { margin-bottom: 0; }

a.link-internal {
    display: block;
    background: #f0f3ff;
    border: 1.5px solid #c8d1fa;
    border-radius: 9px;
    padding: 0.65rem 1.1rem;
    margin: 0.45rem 0;
    color: #1e2d7a;
    font-weight: 500;
    text-decoration: none;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    cursor: pointer;
}
a.link-internal:hover {
    background: #dce3ff;
    border-color: #7c8fee;
    transform: translateX(3px);
    text-decoration: none;
    color: #111e6e;
}
a.link-internal:active {
    background: #c7d0f9;
    transform: translateX(1px);
}

.feedback-correct {
    background: #f0fbf4;
    border-left: 4px solid #27a85f;
    border-radius: 0 9px 9px 0;
    padding: 0.8rem 1rem;
    margin: 0.5rem 0 1rem;
    color: #14472e;
}
.feedback-incorrect {
    background: #fff4f0;
    border-left: 4px solid #e05a2b;
    border-radius: 0 9px 9px 0;
    padding: 0.8rem 1rem;
    margin: 0.5rem 0 1rem;
    color: #5c2010;
}

.key-box {
    background: #fafbff;
    border: 1px solid #d4daf7;
    border-radius: 9px;
    padding: 0.8rem 1rem;
    margin: 0.8rem 0;
    font-size: 0.95rem;
    line-height: 1.65;
}
.key-box strong { color: #1e2d7a; }

.progress-label {
    font-size: 0.78rem;
    color: #777;
    margin-bottom: 0.3rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
}
.progress-bar {
    background: #e8eaf0;
    border-radius: 99px;
    height: 5px;
    margin-bottom: 1.25rem;
    overflow: hidden;
}
.progress-fill {
    background: linear-gradient(90deg, #4a6cf7, #7c8fee);
    height: 100%;
    border-radius: 99px;
}

.section-label {
    display: inline-block;
    border-radius: 99px;
    padding: 0.18rem 0.75rem;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.75rem;
    background: #e8eaf0;
    color: #444;
}
.section-label.classical   { background: #e6f0ff; color: #0a4d8f; }
.section-label.alternative { background: #e6fff0; color: #0a5c35; }
.section-label.lectin      { background: #fff8e6; color: #7a4800; }
.section-label.shared      { background: #f5e6ff; color: #5b0a8a; }
.section-label.regulation  { background: #fff3e0; color: #7a3800; }
.section-label.clinical    { background: #e6f7ff; color: #006699; }

.clinical-table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
    font-size: 0.92rem;
}
.clinical-table th, .clinical-table td {
    border: 1px solid #d4daf7;
    padding: 0.6rem 0.8rem;
    text-align: left;
}
.clinical-table th {
    background: #fafbff;
    color: #1e2d7a;
    font-weight: 600;
}


.back-btn {
    display: inline-block;
    margin-top: 1.25rem;
    padding: 0.5rem 1rem;
    background: #f0f3ff;
    border: 1.5px solid #c8d1fa;
    border-radius: 9px;
    color: #1e2d7a;
    font-weight: 500;
    font-size: 0.92rem;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, border-color 0.15s;
}
.back-btn:hover {
    background: #dce3ff;
    border-color: #7c8fee;
}

.mcq-link {
    display: block;
    margin-top: 0.5rem;
    padding: 0.65rem 1rem;
    background: #f0faf4;
    border: 1.5px solid #27a85f;
    border-radius: 9px;
    color: #0d4a2e;
    font-weight: 600;
    font-size: 0.97rem;
    text-decoration: none;
    transition: background 0.15s, border-color 0.15s;
}
.mcq-link:hover {
    background: #d4f0e2;
    border-color: #1a7a45;
}
.score-display {
    text-align: center;
    font-size: 3.2rem;
    font-weight: 700;
    margin: 1.5rem 0 1rem;
    letter-spacing: 0.02em;
}

/* ── Student ID Modal ─────────────────────────────────── */
#student-modal {
    position: fixed;
    inset: 0;
    background: rgba(20,30,80,0.82);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    backdrop-filter: blur(6px);
}
.modal-card {
    background: #fff;
    border-radius: 18px;
    padding: 2.6rem 2.2rem 2.2rem;
    max-width: 390px;
    width: 92%;
    text-align: center;
    box-shadow: 0 28px 80px rgba(0,0,0,0.32);
}
.modal-card h2 { margin:0 0 0.5rem; color:#1e2d7a; font-size:1.45rem; }
.modal-card p  { color:#556; font-size:0.95rem; margin:0 0 1.5rem; line-height:1.55; }
#sid-input {
    width:100%; box-sizing:border-box;
    font-size:2.4rem; text-align:center;
    letter-spacing:0.6em; padding:0.5rem 0.3rem;
    border:2.5px solid #c8d1fa; border-radius:10px;
    color:#1e2d7a; outline:none; margin-bottom:0.45rem;
    transition:border-color 0.15s; font-family:monospace;
}
#sid-input:focus { border-color:#5b6ef5; }
#sid-input.sid-error { border-color:#e74c3c; animation:shake 0.3s; }
@keyframes shake {
  0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)}
}
#sid-errtxt { color:#c0392b; font-size:0.85rem; min-height:1.3em; margin-bottom:0.75rem; }
#sid-btn {
    width:100%; padding:0.82rem;
    background:#3d52d5; color:white;
    border:none; border-radius:10px;
    font-size:1.05rem; font-weight:600;
    cursor:pointer; transition:background 0.15s; margin-top:0.3rem;
}
#sid-btn:hover { background:#2a3db8; }

/* ── Item 1: Mobile table scroll ─────────────────────────────────── */
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: .8rem 0; }

/* ── Item 2 & 8: Answer vs navigation link styles ────────────────── */
a.link-answer {
    background: #fafbff;
    border: 1.5px solid #c0c8f4;
    color: #2a3460;
    font-weight: 400;
    font-size: 0.96rem;
}
a.link-answer::before { content: "○ "; color: #9aa5e0; }
a.link-answer:hover {
    background: #edf0fc;
    border-color: #7c8fee;
    color: #1a2350;
}
a.link-continue {
    background: #1e2d7a;
    border: 1.5px solid #162060;
    color: #fff;
    font-weight: 600;
}
a.link-continue:hover {
    background: #2a3e9e;
    border-color: #1e2d7a;
    color: #fff;
    transform: translateX(3px);
}
a.link-continue:active { background: #152050; }

/* ── Item 10: Score ring ─────────────────────────────────────────── */
.score-ring { display:flex; align-items:center; justify-content:center;
              flex-direction:column; margin:1.2rem 0 0.5rem; gap:.4rem; }
.score-ring svg { overflow:visible; }

/* ── Item 15: Skeleton loader ────────────────────────────────────── */
.skeleton-loader {
    padding: 2rem 2.25rem;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 2px 16px rgba(30,40,100,0.08);
    border: 1px solid #e4e8f0;
}
.skeleton-line {
    background: linear-gradient(90deg,#eef0f8 25%,#dde0ef 50%,#eef0f8 75%);
    background-size: 400% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 6px;
    height: 1em;
    margin: .7rem 0;
}
@keyframes shimmer { 0%{background-position:100% 50%} 100%{background-position:0% 50%} }

/* ── Item 11: Dark mode ──────────────────────────────────────────── */
@media (prefers-color-scheme: dark) {
    body         { background: #12131f; color: #d8daf0; }
    .passage     { background: #1e1f35; border-color: #2e3058; box-shadow: 0 2px 16px rgba(0,0,0,0.4); }
    h1           { color: #e0e3ff; }
    h2           { color: #9aadff; border-color: #2e3060; }
    h3           { color: #8a9dee; }
    .key-box     { background: #1a1b2e; border-color: #2e3060; }
    .key-box strong { color: #9aadff; }
    a.link-internal {
        background: #1e2045; border-color: #3a4580; color: #b0c0ff;
    }
    a.link-internal:hover { background: #2a2e5a; border-color: #6070d0; color: #c8d4ff; }
    a.link-answer { background: #181928; border-color: #2e3458; color: #9aa8d8; }
    a.link-answer:hover { background: #202245; }
    a.link-continue { background: #2e42b0; border-color: #3a52c8; }
    a.link-continue:hover { background: #3a52c8; }
    .back-btn    { background: #1e2045; border-color: #3a4580; color: #b0c0ff; }
    .back-btn:hover { background: #2a2e5a; }
    .feedback-correct { background: #0e2018; border-color: #27a85f; color: #6ee8a0; }
    .feedback-incorrect { background: #200e08; border-color: #e05a2b; color: #f0a080; }
    .section-label.classical   { background: #0a1a3a; color: #6090e0; }
    .section-label.alternative { background: #0a1e14; color: #60c890; }
    .section-label.lectin      { background: #1e1600; color: #e0a860; }
    .section-label.shared      { background: #1e0a30; color: #c070f0; }
    .section-label.regulation  { background: #1e1000; color: #d08040; }
    .section-label.clinical    { background: #001830; color: #50b0e0; }
    .progress-bar { background: #2a2c40; }
    .clinical-table th         { background: #1a1c30; color: #9aadff; }
    .clinical-table th, .clinical-table td { border-color: #2e3060; }
    .skeleton-line { background: linear-gradient(90deg,#1e2038 25%,#252846 50%,#1e2038 75%); }
    .modal-card { background: #1e1f35; color: #d8daf0; }
    .modal-card h2 { color: #9aadff; }
    .modal-card p  { color: #9098b8; }
    #sid-input { background: #12131f; border-color: #3a4580; color: #d0d8ff; }
    #sid-input:focus { border-color: #7080f0; }
    .score-display { color: inherit; }
}

</style>

<body>
<div id="student-modal">
  <div class="modal-card">
    <h2>Complement System Activity</h2>
    <p>Enter your <strong>5-digit student code</strong> to begin.<br>Your code is provided by your instructor.</p>
    <input type="text" id="sid-input" maxlength="5" inputmode="numeric" placeholder="· · · · ·" autocomplete="off">
    <div id="sid-errtxt"></div>
    <button id="sid-btn">Begin Activity →</button>
  </div>
</div>
<div id="story">
  <div id="passage-container"></div>
</div>
<script>
const PASSAGES = {
"Start-Complement": "<h1>The Complement System</h1>\n<p>The complement system is a crucial part of innate immunity. In this activity you will explore how each of the four pathways is activated, the steps that follow, and where the pathways converge.</p>\n\n<div class=\"key-box\">\n<strong>Four pathways to explore:</strong><br>\n1. The Classical Pathway<br>\n2. The Alternative Pathway<br>\n3. The Lectin Pathway<br>\n4. Regulatory Control of Complement\n</div>\n\n<p>Each pathway contains questions — choose an answer to see immediate feedback and move forward. You can explore all four pathways in any order. Clinical case files are available at any time — use the link on the home page below. You can explore the pathways and clinical cases in any order.</p>\n\n<div style=\"background:#fff8e8;border:1px solid #f5d67a;border-radius:9px;padding:.75rem 1rem;margin:.85rem 0;font-size:.94rem;color:#5a3a00\">\n<strong>💡 How to get the most from this activity:</strong> When you see an answer you're unsure about, choose it deliberately — the feedback explains <em>why</em> it's wrong as well as what's correct. Exploring the wrong paths is part of the learning design, not a mistake.\n</div>\n\n<p>''Where would you like to start?''</p>\n\n[[Explore the Classical Pathway|Classical-Intro]]\n[[Explore the Alternative Pathway|Alternative-Intro]]\n[[Explore the Lectin Pathway|Lectin-Intro]]\n\n<hr style=\"border:none;margin:1rem 0;\">\n\n[[Explore Regulatory Control of Complement|Regulation_Intro]]\n[[Review: Clinical Notes for CH50 Detectable Defects|Clinical-Notes-Menu]]\n\n<hr style=\"border:none;margin:1rem 0;\">\n<a class=\"link-internal mcq-link\" href=\"#\" data-target=\"Retrieval-Intro\">📝  MCQ Self-Test — Score Your Knowledge (10 questions)</a>", 

"Clinical-Notes-Menu": "<div class=\"section-label clinical\">Clinical Medicine</div>\n<h1>Classical Complement Pathway Deficiencies</h1>\n<p>The <strong>CH50 (total haemolytic complement) assay</strong> tests the ability of serum to lyse 50% of antibody-sensitised sheep erythrocytes via the classical pathway (C1-C9). A deficiency in any single component renders the assay severely reduced or absent. Evaluating these case studies illustrates distinct pathway deficiencies with characteristic clinical and laboratory profiles.</p>\n<div style=\"background:#e8f4fd;border:1px solid #7ab8e8;border-radius:9px;padding:.75rem 1rem;margin:.85rem 0;font-size:.94rem;\">\n<strong>\u26a0\ufe0f Reminder \u2014 Immune Complex Clearance:</strong> One critical function of complement is clearing immune complexes. C3b and C4b coat complexes; CR1 on red blood cells then shuttles them to the liver and spleen for macrophage-mediated destruction. Defects in this pathway (C1q, C2, C4) allow immune complexes to deposit in tissues \u2014 driving the SLE-like phenotype seen in Cases 1, 2 and 4.\n</div>\n\n<p>''Select a clinical case file to review:''</p>\n\n[[Case 1: C1q Deficiency (9yo F — Recurrent Infections & Lupus-like Rash)|Clinical-Case-1]]\n[[Case 2: C2 Deficiency (34yo M — Recurrent Sinopulmonary Infections & SLE)|Clinical-Case-2]]\n[[Case 3: C3 Deficiency (3yo M — Severe Phenotype / Multi-Pathway Failure)|Clinical-Case-3]]\n[[Case 4: C4A/C4B Null Allele Deficiency (22yo F — Treatment-Refractory SLE)|Clinical-Case-4]]\n[[Case 5: C5 Deficiency (19yo M — Recurrent Neisseria Meningitidis)|Clinical-Case-5]]\n[[📊 Review CH50 vs AP50 Diagnostic Summary Table|Clinical-Diagnostic-Summary]]\n\n<br>\n[[← Return to Main Pathway Selection|Start-Complement]]",

"Clinical-Case-1": "<div class=\"section-label clinical\">Clinical Case Study</div>\n<h2>Case 1: C1q Deficiency [Rare autosomal recessive]</h2>\n<p><strong>Patient Profile:</strong> Female, 9 years old — recurrent infections & lupus-like rash.</p>\n\n<h3>Pathway Blockade Site</h3>\n<p><strong>C1q [BLOCKED]</strong> → C1r/C1s → C4 → C2 → C3 → MAC (C5–C9)</p>\n\n<h3>Clinical Presentation</h3>\n<p>A 9-year-old girl is referred to paediatric immunology with a 3-year history of a photosensitive malar rash, recurrent otitis media, and two prior episodes of pneumococcal bacteraemia. She has mild arthralgia affecting the small joints of her hands. Her mother reports that a maternal uncle died in childhood from 'overwhelming infection.' On examination she has a butterfly-shaped erythematous rash over both cheeks sparing the nasolabial folds, and mild cervical lymphadenopathy.</p>\n\n<h3>Laboratory Findings</h3>\n<table class=\"clinical-table\">\n  <tr><th>Test</th><th>Result</th><th>Reference / Note</th></tr>\n  <tr><td>CH50 (total haemolytic)</td><td><strong>0 U/mL</strong></td><td>Ref: 41–90 U/mL — absent activity</td></tr>\n  <tr><td>C1q antigen level</td><td><strong>&lt;1 mg/dL</strong></td><td>Ref: 14–22 mg/dL — undetectable</td></tr>\n  <tr><td>C4 level</td><td><strong>Low-normal</strong></td><td>Upstream blockade limits consumption</td></tr>\n  <tr><td>ANA / anti-dsDNA</td><td><strong>Positive (1:320)</strong></td><td>Mimics SLE serology</td></tr>\n  <tr><td>AP50 (alternative pathway)</td><td><strong>Normal</strong></td><td>Alternative pathway intact</td></tr>\n  <tr><td>C1q functional assay</td><td><strong>Absent</strong></td><td>Confirms absence of C1q function</td></tr>\n</table>\n\n<h3>Pathophysiology</h3>\n<p>C1q is the pattern-recognition subunit of the C1 complex. Its absence abolishes classical pathway activation from the very first step, explaining the zero CH50 despite intact C4 and C3 protein levels. C1q also acts as a bridge molecule for clearing apoptotic cell debris. C1q directly binds exposed <strong>phosphatidylserine</strong>, <strong>DNA</strong>, and <strong>calreticulin</strong> on the surface of apoptotic cells, flagging them for macrophage uptake. Without this function, apoptotic cells accumulate and release nuclear autoantigens (especially dsDNA and histones) — triggering anti-dsDNA antibodies and ANA production. This mechanism produces an SLE-like phenotype in up to 93% of C1q-deficient patients. The inability to opsonise encapsulated bacteria via complement explains the recurrent pneumococcal and Haemophilus infections.</p>\n\n<h3>Management</h3>\n<p>Lifelong prophylactic penicillin V; catch-up immunisation with PCV13, MenACWY, MenB, and Hib vaccines. Hydroxychloroquine for the autoimmune phenotype. Low-threshold antibiotic therapy for febrile illness. Genetic counselling (autosomal recessive — COLEC11/C1QA/B/C loci) and screening of siblings.</p>\n\n[[Return to Clinical Notes Menu|Clinical-Notes-Menu]]",

"Clinical-Case-2": "<div class=\"section-label clinical\">Clinical Case Study</div>\n<h2>Case 2: C2 Deficiency [Most common classical deficiency]</h2>\n<p><strong>Patient Profile:</strong> Male, 34 years old — recurrent sinopulmonary infections & SLE diagnosis.</p>\n\n<h3>Pathway Blockade Site</h3>\n<p>C1q → C1r/C1s → C4 → <strong>C2 [BLOCKED]</strong> → C3 convertase (C4b2a) → MAC</p>\n\n<h3>Clinical Presentation</h3>\n<p>A 34-year-old male solicitor presents with his fourth episode of bacterial sinusitis in 18 months, twice requiring intravenous antibiotics. He was diagnosed with SLE at age 28, with arthritis, a discoid rash, and pleuritis. He recalls his father having 'immune problems.' His SLE has been atypically resistant to standard therapy. He has no history of Neisseria infections. On examination there is bilateral tenderness over the maxillary sinuses and a small pleural rub at the left base.</p>\n\n<h3>Laboratory Findings</h3>\n<table class=\"clinical-table\">\n  <tr><th>Test</th><th>Result</th><th>Reference / Note</th></tr>\n  <tr><td>CH50</td><td><strong>&lt;10 U/mL</strong></td><td>Severely reduced — near absent</td></tr>\n  <tr><td>C2 antigen</td><td><strong>Undetectable</strong></td><td>Ref: 22–34 mg/dL</td></tr>\n  <tr><td>C4 level</td><td><strong>Normal</strong></td><td>C4 cleavage cannot proceed without C2</td></tr>\n  <tr><td>C3 level</td><td><strong>Normal</strong></td><td>Alternative pathway maintains some C3</td></tr>\n  <tr><td>AP50</td><td><strong>Normal</strong></td><td>C2 not used in alternative pathway</td></tr>\n  <tr><td>MBL pathway function</td><td><strong>Reduced</strong></td><td>MBL pathway also uses C2; impaired</td></tr>\n</table>\n\n<h3>Pathophysiology</h3>\n<p>C2 is cleaved by C1s to form C2a and C2b. C4b2a (the classical C3 convertase) cannot form without C2a, arresting the cascade before C3 cleavage and abolishing opsonisation via this route. C2 deficiency is the most common inherited complement deficiency in people of Northern European ancestry (approximately 1 in 10,000–20,000), typically linked to the HLA-A25, B18, DR2 haplotype. Because C2 is also used by the lectin/MBL pathway, both CH50 and MBL-dependent haemolysis are impaired, but AP50 is completely normal — a diagnostically useful dissociation. Impaired immune complex clearance predisposes to SLE-like disease in approximately 10–30% of homozygous-deficient individuals.</p>\n\n<h3>Management</h3>\n<p>Prophylactic amoxicillin-clavulanate or azithromycin; pneumococcal, meningococcal, and Hib vaccination with periodic booster doses. SLE managed with hydroxychloroquine and low-dose prednisolone; note that belimumab (anti-BAFF) may be preferred over complement-pathway biologics. Genetic testing (chromosome 6p21.3, MHC class III region) and family cascade testing.</p>\n\n[[Return to Clinical Notes Menu|Clinical-Notes-Menu]]",

"Clinical-Case-3": "<div class=\"section-label clinical\">Clinical Case Study</div>\n<h2>Case 3: C3 Deficiency [Severe phenotype — all pathways affected]</h2>\n<p><strong>Patient Profile:</strong> Male, 3 years old — recurrent severe bacterial infections since infancy.</p>\n\n<h3>Pathway Blockade Site</h3>\n<p>C1–C4–C2 → <strong>C3 [BLOCKED]</strong> → C3b opsonisation → C5 convertase → MAC (C5–C9)</p>\n\n<h3>Clinical Presentation</h3>\n<p>A 3-year-old boy is admitted for the fifth time with pneumococcal meningitis. Since age 6 months he has had recurrent episodes of pneumonia, otitis media, and two prior episodes of septicaemia with Streptococcus pneumoniae. Growth is on the 3rd centile. He is the first child of consanguineous parents (first cousins) of South Asian origin. His parents report that a sibling died at 18 months from an unspecified overwhelming infection. On admission he is febrile (39.2°C), tachycardic, has neck stiffness, and a bulging fontanelle.</p>\n\n<h3>Laboratory Findings</h3>\n<table class=\"clinical-table\">\n  <tr><th>Test</th><th>Result</th><th>Reference / Note</th></tr>\n  <tr><td>CH50</td><td><strong>0 U/mL</strong></td><td>Completely absent</td></tr>\n  <tr><td>AP50</td><td><strong>0 U/mL</strong></td><td>Also absent — C3 required by all pathways</td></tr>\n  <tr><td>C3 antigen level</td><td><strong>&lt;1 mg/dL</strong></td><td>Ref: 90–180 mg/dL — undetectable</td></tr>\n  <tr><td>C4 level</td><td><strong>Normal</strong></td><td>Upstream intact; cannot signal downstream</td></tr>\n  <tr><td>C1q level</td><td><strong>Normal</strong></td><td>Recognition unit unaffected</td></tr>\n  <tr><td>Opsonophagocytosis assay</td><td><strong>Severely impaired</strong></td><td>No C3b deposition on bacteria</td></tr>\n</table>\n\n<h3>Pathophysiology</h3>\n<p>C3 is the convergence point of all three complement pathways. Its absence renders the patient unable to generate C3b for opsonisation (via CR1 on phagocytes), C3a for mast cell degranulation, or C5 convertase — eliminating both innate killing and antibody-independent opsonisation simultaneously. This explains why both CH50 and AP50 are zero — a key diagnostic fingerprint distinguishing C3 deficiency from classical-only or alternative-only defects. Secondary C3 deficiency (from consumption — e.g. C3 nephritic factor, MPGN) must be excluded; primary deficiency is autosomal recessive and rare, with consanguinity being a major risk factor. Encapsulated bacteria (pneumococcus, meningococcus, Haemophilus) that rely on complement-mediated opsonisation for clearance cause disproportionate, recurrent, life-threatening disease.</p>\n\n<h3>Management</h3>\n<p>Emergency treatment of active meningitis per local protocol (ceftriaxone + dexamethasone). Long-term: lifelong prophylactic phenoxymethylpenicillin; full immunisation schedule including 13-valent PCV, ACWY and B meningococcal vaccines, Hib, and annual influenza. Regular IVIG infusions considered to supplement opsonising antibody. Genetic counselling and urgent sibling screening (C3 gene on chromosome 19p13.3). Parental education regarding fever response and emergency antibiotic supply.</p>\n\n[[Return to Clinical Notes Menu|Clinical-Notes-Menu]]",

"Clinical-Case-4": "<div class=\"section-label clinical\">Clinical Case Study</div>\n<h2>Case 4: C4A/C4B Null Allele Deficiency [SLE susceptibility locus]</h2>\n<p><strong>Patient Profile:</strong> Female, 22 years old — early-onset SLE refractory to treatment.</p>\n\n<h3>Pathway Blockade Site</h3>\n<p>C1q → C1r/C1s → <strong>C4 [PARTIAL BLOCK]</strong> → C4b2a convertase → C3 → MAC</p>\n\n<h3>Clinical Presentation</h3>\n<p>A 22-year-old woman of West African origin is referred to rheumatology after 18 months of fatigue, a photosensitive facial rash, painful oral ulcers, pleuritis, and diffuse non-scarring alopecia. She has had two prior episodes of non-bacterial (sterile) peritonitis. Blood tests showed lymphopenia and a raised ESR, initially attributed to viral illness. Family history is notable for a maternal aunt with SLE. On examination she has a malar rash, two oral ulcers, and mild bilateral pitting oedema. Urinalysis shows 3+ protein and microscopic haematuria, raising concern for lupus nephritis.</p>\n\n<h3>Laboratory Findings</h3>\n<table class=\"clinical-table\">\n  <tr><th>Test</th><th>Result</th><th>Reference / Note</th></tr>\n  <tr><td>CH50</td><td><strong>18 U/mL</strong></td><td>Ref: 41–90 — substantially reduced</td></tr>\n  <tr><td>C4 total antigen</td><td><strong>4 mg/dL</strong></td><td>Ref: 16–38 mg/dL — severely low</td></tr>\n  <tr><td>C4A isotype</td><td><strong>Undetectable</strong></td><td>Homozygous C4A null allele confirmed</td></tr>\n  <tr><td>C4B isotype</td><td><strong>Low (1 copy)</strong></td><td>One functional C4B allele retained</td></tr>\n  <tr><td>C3 level</td><td><strong>Low (58 mg/dL)</strong></td><td>Ref: 90–180 — consumed by active disease</td></tr>\n  <tr><td>Anti-C1q antibodies</td><td><strong>Positive</strong></td><td>Associated with active nephritis in SLE</td></tr>\n</table>\n\n<h3>Pathophysiology</h3>\n<p>C4 serves two key functions in the classical and lectin pathways: forming the C3 convertase (C4b2a), and coating immune complexes via C4b to prevent their tissue deposition. In this patient, reduced total C4 impairs both functions — immune complexes are inadequately opsonised and cannot be transported efficiently by CR1 on erythrocytes to the liver and spleen for clearance. Accumulating immune complexes deposit in the glomerulus and other tissues, driving the SLE phenotype — the same mechanism responsible for SLE-like disease in C1q and C2 deficiency. Residual C4 activity means the classical pathway retains some function — explaining the reduced but not zero CH50. During active disease, remaining C4 is consumed further, causing CH50 depression and low C3. The AP50 remains normal since C4 is not required for the alternative pathway.</p>\n\n<h3>Management</h3>\n<p>Renal biopsy to classify lupus nephritis (likely class III/IV given urinalysis findings). Treatment per EULAR/ACR guidance: hydroxychloroquine as backbone; mycophenolate mofetil or low-dose cyclophosphamide for nephritis induction; belimumab as adjunct. Strict sun protection. Monitor CH50, C3, C4, anti-dsDNA, and urine PCR as disease activity markers. Counsel regarding familial SLE risk — C4 null allele status can be discussed with an immunologist for first-degree relatives. Avoid oestrogen-containing contraception (thrombosis risk in SLE).</p>\n\n[[Return to Clinical Notes Menu|Clinical-Notes-Menu]]",

"Clinical-Case-5": "<div class=\"section-label clinical\">Clinical Case Study</div>\n<h1>Case 5: C5 Deficiency <small>[Terminal complement / MAC deficiency]</small></h1>\n<p><strong>Patient Profile:</strong> Male, 19 years old — recurrent <em>Neisseria meningitidis</em> infections.</p>\n\n<div class=\"key-box\">\n<strong>Pathway Blockade Site</strong><br>\nC1 → C4 → C2 → C3 → <strong>C5 [BLOCKED]</strong> → C6 → C7 → C8 → C9 (MAC)\n</div>\n\n<h2>Clinical Presentation</h2>\n<p>A 19-year-old male university student is admitted for his <strong>second episode of bacterial meningitis</strong> in three years. Both episodes were caused by <em>Neisseria meningitidis</em> (serogroup B on the first occasion, serogroup Y now). He received MenACWY vaccination at age 14 and was fully vaccinated — recurrent disease despite vaccination prompted immunological investigation.</p>\n<p>On admission he is febrile (40.1°C), photophobic, and has a <strong>petechial rash</strong> over the trunk and legs. He is alert but has marked neck stiffness. A paternal uncle reportedly died from ‘meningococcal septicaemia’ at age 22. Blood cultures and CSF culture confirm <em>N. meningitidis</em> serogroup Y.</p>\n\n<h2>Laboratory Findings</h2>\n<table class=\"clinical-table\">\n  <tr><th>Test</th><th>Result</th><th>Reference</th></tr>\n  <tr><td>CH50 (haemolytic complement)</td><td><strong>Undetectable (0%)</strong></td><td>70–130%</td></tr>\n  <tr><td>AP50 (alternative pathway haemolysis)</td><td><strong>Undetectable (0%)</strong></td><td>75–135%</td></tr>\n  <tr><td>C3</td><td><strong>Normal (1.1 g/L)</strong></td><td>0.9–1.8 g/L</td></tr>\n  <tr><td>C4</td><td>Normal</td><td>0.16–0.38 g/L</td></tr>\n  <tr><td>C5 antigen (nephelometry)</td><td><strong>Absent (&lt;2% of normal)</strong></td><td>Present</td></tr>\n  <tr><td>C1q, C2, Factor B</td><td>Normal</td><td>—</td></tr>\n  <tr><td>FBC</td><td>Leukocytosis (21 × 10⁹/L), neutrophilia</td><td>4–11 × 10⁹/L</td></tr>\n  <tr><td>CRP</td><td>228 mg/L</td><td>&lt;5 mg/L</td></tr>\n</table>\n\n<h2>Interpretation</h2>\n<div class=\"key-box\">\n<strong>1. Both CH50 and AP50 are undetectable</strong> — terminal complement components (C5–C9) are <em>shared</em> between all pathways; deficiency of any one of them abolishes both assays simultaneously.\n</div>\n<div class=\"key-box\">\n<strong>2. C3 is normal</strong> — this is the critical distinguishing feature from <strong>C3 deficiency</strong>, which also shows zero CH50 and AP50. In MAC deficiency, all upstream components function normally; the block is at the terminal step.\n</div>\n<div class=\"key-box\">\n<strong>3. Selective susceptibility to <em>Neisseria</em></strong> — the MAC is the primary mechanism for killing Gram-negative diplococci, which have thin peptidoglycan walls easily penetrated by the pore. Gram-positive bacteria (e.g. <em>Staphylococcus aureus</em>) have thick cell walls resistant to the MAC; they are cleared by opsonisation and phagocytosis, which remain intact here. In addition, <em>N. meningitidis</em>'s polysaccharide capsule resists opsonophagocytosis, making MAC-mediated serum bactericidal killing the primary host defence.\n</div>\n\n<h2>Diagnosis and Management</h2>\n<p><strong>Diagnosis:</strong> Autosomal recessive C5 deficiency (confirmed by absent C5 antigen and normal C3/C4).</p>\n<p><strong>Management:</strong></p>\n<ul>\n<li>Long-term prophylactic penicillin V</li>\n<li>Vaccination against all <em>Neisseria</em> serogroups (including MenB/Bexsero)</li>\n<li>Family screening (autosomal recessive — siblings at 25% risk)</li>\n<li>Eculizumab (anti-C5 monoclonal antibody) used in PNH/aHUS; paradoxically, complement-deficient patients do <em>not</em> benefit and are instead managed with infection prophylaxis</li>\n</ul>\n\n[[← Return to Clinical Notes Menu|Clinical-Notes-Menu]]",
"Clinical-Diagnostic-Summary": "<div class=\"section-label clinical\">Diagnostic Summary</div>\n<h2>CH50 vs AP50 Dissociation Analysis</h2>\n<p>Evaluating the mathematical divergence between the Classical Line (CH50) and Alternative Line (AP50) performance allows for highly specific mapping of patient pathology before advanced assays begin.</p>\n\n<table class=\"clinical-table\">\n  <tr>\n    <th>Deficiency</th>\n    <th>CH50</th>\n    <th>AP50</th>\n    <th>Discriminating Feature</th>\n  </tr>\n  <tr>\n    <td><strong>C1q deficiency</strong></td>\n    <td>Zero</td>\n    <td>Normal</td>\n    <td>Absent C1q protein on immunoassay; SLE-like phenotype predominates</td>\n  </tr>\n  <tr>\n    <td><strong>C2 deficiency</strong></td>\n    <td>Near-zero</td>\n    <td>Normal</td>\n    <td>Normal C4 antigen; MBL pathway also impaired; HLA-B18 association</td>\n  </tr>\n  <tr>\n    <td><strong>C3 deficiency</strong></td>\n    <td>Zero</td>\n    <td>Zero</td>\n    <td>Both tests fail simultaneously — unique fingerprint; opsonisation assay impaired</td>\n  </tr>\n  <tr>\n    <td><strong>C4A null allele</strong></td>\n    <td>Reduced</td>\n    <td>Normal</td>\n    <td>CH50 reduced but not zero (one C4B copy retained); C3 low from immune complex consumption</td>\n  </tr>\n  <tr>\n    <td><strong>C5\u2013C9 deficiency (MAC)</strong></td>\n    <td>Zero</td>\n    <td>Zero</td>\n    <td>C3 <em>normal</em> \u2014 key distinction from C3 deficiency; selective <em>Neisseria meningitidis / N. gonorrhoeae</em> susceptibility; C5 antigen absent</td>\n  </tr>\n</table>\n\n<br>\n[[Return to Clinical Notes Menu|Clinical-Notes-Menu]]",

"Classical-Intro": "<div class=\"section-label classical\">Classical Pathway</div>\n<div class=\"progress-label\">Classical Pathway · Step 1 of 4</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:20%\"></div></div>\n\n<h2>Antibody-Mediated Activation</h2>\n<p>The classical pathway is typically initiated when antibodies bind to antigens. The key activating antibodies are <strong>pentameric IgM</strong> or <strong>two or more IgG molecules</strong> (except the IgG4 subclass). The critical initiating molecule is <strong>C1q</strong>.</p>\n\n<p>''Which of the following is the MOST potent activator of the Classical Pathway?''</p>\n\n[[A) A single IgG molecule bound to an antigen|Classical-Q1-Incorrect-IgG-Single]]\n[[B) Multiple IgG molecules clustered on a surface|Classical-Q1-Correct-IgG-Multiple]]\n[[C) Secreted IgA molecules|Classical-Q1-Incorrect-IgA]]\n[[D) A single IgM pentamer bound to an antigen|Classical-Q1-Super-Correct-IgM]]", "Classical-Q1-Incorrect-IgG-Single": "<div class=\"section-label classical\">Classical Pathway</div>\n<div class=\"feedback-incorrect\">\n<strong>Not quite.</strong> A single IgG molecule is not sufficient to activate C1q. C1q must bridge at least two Fc regions simultaneously to activate.\n</div>\n[[← Try again|Classical-Intro]]", "Classical-Q1-Incorrect-IgA": "<div class=\"section-label classical\">Classical Pathway</div>\n<div class=\"feedback-incorrect\">\n<strong>Incorrect.</strong> Secreted IgA primarily functions at mucosal surfaces and does not activate the classical complement pathway.\n</div>\n[[← Try again|Classical-Intro]]", "Classical-Q1-Super-Correct-IgM": "<div class=\"section-label classical\">Classical Pathway</div>\n<div class=\"feedback-correct\">\n<strong>Excellent!</strong> A single IgM pentamer is highly potent — its structure allows C1q to bind multiple Fc regions simultaneously, making it the most potent single-molecule activator of the classical pathway.\n</div>\n<div style=\"margin:.6rem 0 .8rem;padding:.5rem .85rem;background:#e8f9ef;border-left:3px solid #27a85f;border-radius:0 7px 7px 0;font-size:.93rem;color:#14472e\"><strong>Remember:</strong> IgM is pentameric — one molecule can bridge multiple C1q heads simultaneously, making it the most potent single-molecule activator.</div>\n[[Continue → C1 Activation|Classical-C1-Activation]]", "Classical-Q1-Correct-IgG-Multiple": "<div class=\"section-label classical\">Classical Pathway</div>\n<div class=\"feedback-correct\">\n<strong>Correct!</strong> Multiple IgG molecules in close proximity are needed — C1q must bridge at least two IgG Fc regions. A single IgM pentamer can also activate C1q very efficiently due to its multivalent structure.\n</div>\n<div style=\"margin:.6rem 0 .8rem;padding:.5rem .85rem;background:#e8f9ef;border-left:3px solid #27a85f;border-radius:0 7px 7px 0;font-size:.93rem;color:#14472e\"><strong>Remember:</strong> C1q needs to bridge at least two Fc regions — one IgG is never enough on its own.</div>\n[[Continue → C1 Activation|Classical-C1-Activation]]", "Classical-C1-Activation": "<div class=\"section-label classical\">Classical Pathway</div>\n<div class=\"progress-label\">Classical Pathway · Step 2 of 4</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:40%\"></div></div>\n\n<img src=\"C'_Images/Slide1.PNG\" style=\"width:100%;border-radius:9px;margin:0.75rem auto 1rem;display:block;\" alt=\"Diagram showing C1q binding to antibody-antigen complex, activating C1r and C1s serine proteases to initiate the Classical pathway\">\n\n<h2>C1 Activation: The Initial Spark</h2>\n<p>The C1 complex has three components:</p>\n<div class=\"key-box\">\n<strong>C1q</strong> — the recognition unit (binds antibody-antigen complexes)<br>\n<strong>C1r</strong> — a serine protease (activated by C1q binding)<br>\n<strong>C1s</strong> — a serine protease (activated by C1r, then cleaves C4 and C2)\n</div>\n\n<p>''What is the primary role of C1q within the C1 complex?''</p>\n\n[[A) To cleave C4|Classical-Q2-Incorrect-C4Cleavage]]\n[[B) To recognise and bind to antibody-antigen complexes|Classical-Q2-Correct-Recognition]]\n[[C) To stabilise C1r and C1s before activation|Classical-Q2-Incorrect-Stabilization]]", "Classical-Q2-Incorrect-C4Cleavage": "<div class=\"section-label classical\">Classical Pathway</div>\n<div class=\"feedback-incorrect\">\n<strong>Not quite.</strong> C1q is the recognition unit — it binds the antibody. C1s is the serine protease responsible for cleaving C4 (after being activated by C1r).\n</div>\n[[← Try again|Classical-C1-Activation]]", "Classical-Q2-Incorrect-Stabilization": "<div class=\"section-label classical\">Classical Pathway</div>\n<div class=\"feedback-incorrect\">\n<strong>Incorrect.</strong> While the components are held together in the complex, C1q's primary role is target recognition, which then triggers the sequential activation of C1r and C1s.\n</div>\n[[← Try again|Classical-C1-Activation]]", "Classical-Q2-Correct-Recognition": "<div class=\"section-label classical\">Classical Pathway</div>\n<div class=\"feedback-correct\">\n<strong>Excellent!</strong> C1q's globular heads recognise and bind to the Fc portions of antibodies in the immune complex, initiating the classical cascade. This triggers C1r activation, which in turn activates C1s.\n</div>\n<div style=\"margin:.6rem 0 .8rem;padding:.5rem .85rem;background:#e8f9ef;border-left:3px solid #27a85f;border-radius:0 7px 7px 0;font-size:.93rem;color:#14472e\"><strong>Remember:</strong> C1q = recognition only. C1r activates C1s, and C1s is the protease. Always keep these roles distinct.</div>\n[[Continue → C4 Cleavage|Classical-C4-Cleavage]]", "Classical-C4-Cleavage": "<div class=\"section-label classical\">Classical Pathway</div>\n<div class=\"progress-label\">Classical Pathway · Step 3 of 4</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:60%\"></div></div>\n<img src=\"C'_Images/Slide2.PNG\" style=\"width:75%;border-radius:9px;margin:0.75rem auto 1rem;display:block;\" alt=\"C4 cleavage by C1s: C4a anaphylatoxin released; C4b forms covalent thioester bond on the pathogen surface\">\n\n<h2>Cleavage of C4: The First Substrate</h2>\n<p>Activated C1s cleaves C4 into two fragments:</p>\n<div class=\"key-box\">\n<strong>C4a</strong> — small anaphylatoxin, diffuses away<br>\n<strong>C4b</strong> — larger fragment, covalently attaches to the pathogen surface\n</div>\n\n<p>''What is the critical feature of C4b that allows it to participate in forming the next enzyme complex?''</p>\n\n[[A) It directly binds and activates C2 when free in plasma|Classical-Q3-Incorrect-DirectC2Activation]]\n[[B) It can covalently attach to the surface of the antigen|Classical-Q3-Correct-Thioester]]\n[[C) It acts as a chemoattractant for neutrophils|Classical-Q3-Incorrect-ChemoattractantC4b]]", "Classical-Q3-Incorrect-DirectC2Activation": "<div class=\"section-label classical\">Classical Pathway</div>\n<div class=\"feedback-incorrect\">\n<strong>Incorrect.</strong> C4b cannot activate C2 in free solution — it can only recruit C2 after it has attached to the antigen surface.\n</div>\n[[← Try again|Classical-C4-Cleavage]]", "Classical-Q3-Incorrect-ChemoattractantC4b": "<div class=\"section-label classical\">Classical Pathway</div>\n<div class=\"feedback-incorrect\">\n<strong>Incorrect.</strong> Chemoattraction of neutrophils is the role of anaphylatoxins such as C4a (the small fragment), not C4b.\n</div>\n[[← Try again|Classical-C4-Cleavage]]", "Classical-Q3-Correct-Thioester": "<div class=\"section-label classical\">Classical Pathway</div>\n<div class=\"feedback-correct\">\n<strong>Exactly!</strong> Once activated, C4b is highly reactive and forms a covalent bond with hydroxyl or amino groups on the antigen surface, anchoring it precisely where it is needed to recruit C2.\n</div>\n<div style=\"margin:.6rem 0 .8rem;padding:.5rem .85rem;background:#e8f9ef;border-left:3px solid #27a85f;border-radius:0 7px 7px 0;font-size:.93rem;color:#14472e\"><strong>Remember:</strong> C4b's exposed thioester bond allows covalent attachment to the surface — this is what anchors the convertase where it's needed.</div>\n[[Continue → C2 Cleavage|Classical-C2-Cleavage]]", "Classical-C2-Cleavage": "<div class=\"section-label classical\">Classical Pathway</div>\n<div class=\"progress-label\">Classical Pathway · Step 4 of 4</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:80%\"></div></div>\n<img src=\"C'_Images/Slide2.5.PNG\" style=\"width:75%;border-radius:9px;margin:0.75rem auto 1rem;display:block;\" alt=\"C4 cleavage by C1s: C4a anaphylatoxin released; C4b forms covalent thioester bond on the pathogen surface\">\n\n<h2>Cleavage of C2 and the C3 Convertase</h2>\n<p>C2 binds to surface-anchored C4b. Activated C1s then cleaves C2:</p>\n<div class=\"key-box\">\n<strong>C2a</strong> — large fragment (contains the serine protease domain), stays bound to C4b — provides the catalytic activity that cleaves C3<br>\n<strong>C2b</strong> — small fragment, released\n</div>\n<div style=\"margin:.5rem 0 .8rem;padding:.5rem .85rem;background:#fff8e8;border-left:3px solid #f5a623;border-radius:0 7px 7px 0;font-size:.88rem;color:#5a3a00\"><strong>&#9888;&#65039; Naming note:</strong> Unlike C3, C4, and C5 where the 'a' fragment is always the smaller released piece, <strong>C2 is an exception in traditional nomenclature</strong> — C2a is the larger, catalytically active piece that stays in the convertase. A 2014 IUPAC revision proposed reversing a/b for C2, creating inconsistency between textbooks. This activity uses the traditional nomenclature found in most UK immunology texts (Murphy, Abbas).</div>\n<p>The resulting complex <strong>C4b2a</strong> is the <strong>Classical Pathway C3 Convertase</strong>.</p>\n\n<p>''The Classical Pathway C3 Convertase is composed of:''</p>\n\n[[A) C1qrs|Classical-Q4-Incorrect-C1]]\n[[B) C4b2a|Classical-Q4-Correct-C4b2a]]\n[[C) C3bBb|Classical-Q4-Incorrect-AlternativeConvertase]]", "Classical-Q4-Incorrect-C1": "<div class=\"section-label classical\">Classical Pathway</div>\n<div class=\"feedback-incorrect\">\n<strong>Incorrect.</strong> C1qrs is the initiation complex at the very beginning of the pathway — it is not the C3 convertase.\n</div>\n[[← Try again|Classical-C2-Cleavage]]", "Classical-Q4-Incorrect-AlternativeConvertase": "<div class=\"section-label classical\">Classical Pathway</div>\n<div class=\"feedback-incorrect\">\n<strong>Incorrect.</strong> C3bBb is the C3 convertase of the Alternative pathway, not the Classical pathway.\n</div>\n[[← Try again|Classical-C2-Cleavage]]", "Classical-Q4-Correct-C4b2a": "<div class=\"section-label classical\">Classical Pathway</div>\n<div class=\"feedback-correct\">\n<strong>Perfect!</strong> C4b2a is the Classical Pathway C3 Convertase. Its substrate is C3, and it cleaves hundreds of C3 molecules to amplify the complement response.\n</div>\n<div style=\"margin:.6rem 0 .8rem;padding:.5rem .85rem;background:#e8f9ef;border-left:3px solid #27a85f;border-radius:0 7px 7px 0;font-size:.93rem;color:#14472e\"><strong>Remember:</strong> Classical C3 convertase = C4b2a. Alternative = C3bBb. Keeping these paired is worth memorising.</div>\n[[Continue → C3 Cleavage (shared steps)|Shared-C3-Cleavage-From-Alternative]]", "Alternative-Intro": "<div class=\"section-label alternative\">Alternative Pathway</div>\n<div class=\"progress-label\">Alternative Pathway · Step 1 of 5</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:20%\"></div></div>\n\n<img src=\"C'_Images/Slide5.1.PNG\" style=\"width:50%;border-radius:9px;margin:0.75rem auto 1rem;display:block;\" alt=\"Alternative pathway initiation by spontaneous C3 hydrolysis (tick-over), generating C3(H₂O)\">\n\n<h2>Spontaneous Activation and Amplification</h2>\n<p>Unlike the classical pathway, the alternative pathway does <strong>not</strong> require antibodies. It relies on:</p>\n<div class=\"key-box\">\n<strong>Factor B</strong>, <strong>Factor D</strong>, and <strong>Properdin (Factor P)</strong>\n</div>\n<p>It can be initiated by spontaneous C3 hydrolysis or by C3b binding to a pathogen surface.</p>\n\n<p>''Which event is a primary initiator of the Alternative Pathway?''</p>\n\n[[A) Binding of Mannose-Binding Lectin (MBL) to mannose|Alternative-Q1-Incorrect-MBL]]\n[[B) Spontaneous hydrolysis of C3 to C3(H2O)|Alternative-Q1-Correct-C3Tickover]]\n[[C) Binding of C1q to antibody-antigen complexes|Alternative-Q1-Incorrect-C1q]]", "Alternative-Q1-Incorrect-MBL": "<div class=\"section-label alternative\">Alternative Pathway</div>\n<div class=\"feedback-incorrect\">\n<strong>Not quite.</strong> MBL binding to mannose initiates the Lectin pathway, not the alternative pathway.\n</div>\n[[← Try again|Alternative-Intro]]", "Alternative-Q1-Incorrect-C1q": "<div class=\"section-label alternative\">Alternative Pathway</div>\n<div class=\"feedback-incorrect\">\n<strong>Incorrect.</strong> C1q binding to antibody-antigen complexes initiates the Classical pathway.\n</div>\n[[← Try again|Alternative-Intro]]", "Alternative-Q1-Correct-C3Tickover": "<div class=\"section-label alternative\">Alternative Pathway</div>\n<div class=\"feedback-correct\">\n<strong>Correct!</strong> C3 spontaneously hydrolyses in plasma to form C3(H2O) — also called iC3. This slow, continuous process is called ''C3 tick-over'' and is the starting point for initiating the alternative pathway.\n</div>\n<div style=\"margin:.6rem 0 .8rem;padding:.5rem .85rem;background:#e8f9ef;border-left:3px solid #27a85f;border-radius:0 7px 7px 0;font-size:.93rem;color:#14472e\"><strong>Remember:</strong> C3 tick-over is spontaneous and continuous — the alternative pathway is always 'on' at a low level, surveying surfaces.</div>\n[[Continue → C3(H2O) and Factor B|Alternative-C3H2O-FactorB]]", "Alternative-C3H2O-FactorB": "<div class=\"section-label alternative\">Alternative Pathway</div>\n<div class=\"progress-label\">Alternative Pathway · Step 2 of 5</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:40%\"></div></div>\n\n<img src=\"C'_Images/Slide5.2.PNG\" style=\"width:75%;border-radius:9px;margin:0.75rem auto 1rem;display:block;\" alt=\"C3(H₂O) binding Factor B; Factor D cleaves Factor B to form the fluid-phase C3 convertase C3(H₂O)Bb\">\n\n<h2>C3(H2O) and Factor B</h2>\n<p>Spontaneously hydrolysed C3 — C3(H2O) — exposes a new binding site. Factor B binds to it, forming the <strong>C3(H2O)B complex</strong>. Factor D (a serine protease circulating in plasma) then acts on this complex.</p>\n\n<p>''What is the role of Factor D here?''</p>\n\n[[A) It stabilises the C3(H2O)B complex|Alternative-Q2-Incorrect-Stabilization]]\n[[B) It cleaves Factor B (when bound to C3(H2O)), generating Ba and Bb|Alternative-Q2-Correct-CleaveB]]\n[[C) It directly cleaves C3|Alternative-Q2-Incorrect-CleaveC3]]", "Alternative-Q2-Incorrect-Stabilization": "<div class=\"section-label alternative\">Alternative Pathway</div>\n<div class=\"feedback-incorrect\">\n<strong>Not quite.</strong> Stabilisation of convertase complexes is important elsewhere (think Properdin!), but Factor D's role here is enzymatic — it cleaves Factor B rather than holding the complex together.\n</div>\n[[← Try again|Alternative-C3H2O-FactorB]]", "Alternative-Q2-Incorrect-CleaveC3": "<div class=\"section-label alternative\">Alternative Pathway</div>\n<div class=\"feedback-incorrect\">\n<strong>Incorrect.</strong> Factor D does not act on C3. Cleaving C3 is the role of the C3 convertase — which is about to be formed.\n</div>\n[[← Try again|Alternative-C3H2O-FactorB]]", "Alternative-Q2-Correct-CleaveB": "<div class=\"section-label alternative\">Alternative Pathway</div>\n<div class=\"feedback-correct\">\n<strong>Precisely!</strong> Factor D cleaves Factor B only when B is already bound to C3b or C3(H2O). This produces <strong>Ba</strong> (released, small fragment) and <strong>Bb</strong> (the enzymatically active large fragment).\n</div>\n<div style=\"margin:.6rem 0 .8rem;padding:.5rem .85rem;background:#e8f9ef;border-left:3px solid #27a85f;border-radius:0 7px 7px 0;font-size:.93rem;color:#14472e\"><strong>Remember:</strong> Factor D only cleaves Factor B when B is already bound to C3b or C3(H2O) — a built-in safety check.</div>\n[[Continue → Fluid-Phase C3 Convertase|Alternative-Initial-C3Convertase]]", "Alternative-Initial-C3Convertase": "<div class=\"section-label alternative\">Alternative Pathway</div>\n<div class=\"progress-label\">Alternative Pathway · Step 3 of 5</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:60%\"></div></div>\n\n<img src=\"C'_Images/Slide5.PNG\" style=\"width:50%;border-radius:9px;margin:0.75rem auto 1rem;display:block;\" alt=\"Fluid-phase C3 convertase generating initial C3b deposits on pathogen surfaces\">\n\n<h2>The Fluid-Phase C3 Convertase: C3(H2O)Bb</h2>\n<p>Bb remains bound to C3(H2O), forming the <strong>fluid-phase C3 convertase: C3(H2O)Bb</strong>. This short-lived enzyme can cleave C3 in the plasma, generating C3b that deposits onto nearby surfaces.</p>\n\n<p>''Why is C3(H2O)Bb described as a \"fluid-phase\" convertase?''</p>\n\n[[A) It only works on soluble C3 molecules|Alternative-Q3-Incorrect-SolubleC3Only]]\n[[B) It is not covalently attached to a cell surface|Alternative-Q3-Correct-NotSurfaceBound]]\n[[C) It requires water for its enzymatic activity|Alternative-Q3-Incorrect-RequiresWater]]", "Alternative-Q3-Incorrect-SolubleC3Only": "<div class=\"section-label alternative\">Alternative Pathway</div>\n<div class=\"feedback-incorrect\">\n<strong>Not quite.</strong> While this convertase does act on soluble C3, surface-bound convertases also cleave soluble C3. The \"fluid-phase\" label refers to the location of the enzyme itself, not just its substrate.\n</div>\n[[← Try again|Alternative-Initial-C3Convertase]]", "Alternative-Q3-Incorrect-RequiresWater": "<div class=\"section-label alternative\">Alternative Pathway</div>\n<div class=\"feedback-incorrect\">\n<strong>Clever thought, but not quite.</strong> Water is involved in forming C3(H2O), but the \"fluid-phase\" label refers to the fact that the enzyme complex itself is freely dissolved in plasma rather than anchored to a surface.\n</div>\n[[← Try again|Alternative-Initial-C3Convertase]]", "Alternative-Q3-Correct-NotSurfaceBound": "<div class=\"section-label alternative\">Alternative Pathway</div>\n<div class=\"feedback-correct\">\n<strong>Exactly!</strong> Because C3(H2O) is not bound to any surface, the C3(H2O)Bb convertase floats freely in the plasma — hence \"fluid-phase.\" It is quickly inactivated if it doesn't find a substrate.\n</div>\n<div style=\"margin:.6rem 0 .8rem;padding:.5rem .85rem;background:#e8f9ef;border-left:3px solid #27a85f;border-radius:0 7px 7px 0;font-size:.93rem;color:#14472e\"><strong>Remember:</strong> 'Fluid-phase' describes where the enzyme complex is, not what it acts on. C3(H2O)Bb floats free in plasma.</div>\n[[Continue → C3b Deposition|Alternative-C3b-Deposition]]", "Alternative-C3b-Deposition": "<div class=\"section-label alternative\">Alternative Pathway</div>\n<div class=\"progress-label\">Alternative Pathway · Step 4 of 5</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:80%\"></div></div>\n\n<img src=\"C'_Images/Slide6.PNG\" style=\"width:40%;border-radius:9px;margin:0.75rem auto 1rem;display:block;\" alt=\"C3b covalently depositing on pathogen surface via thioester bond, acting as an opsonin\">\n\n<h2>C3b Deposition and the Amplification Loop</h2>\n<p>The fluid-phase convertase cleaves C3 → <strong>C3a</strong> (anaphylatoxin) + <strong>C3b</strong>. C3b covalently attaches to nearby surfaces via a thioester bond.</p>\n<p>If C3b lands on a <em>pathogen surface</em> (lacking complement regulators), it binds Factor B — starting a much more potent, surface-bound convertase. This is the <strong>amplification loop</strong>.</p>\n\n[[Continue → Surface-Bound Convertase|Alternative-Surface-FactorB]]", "Alternative-Surface-FactorB": "<div class=\"section-label alternative\">Alternative Pathway</div>\n<div class=\"progress-label\">Alternative Pathway · Step 5 of 5</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:100%\"></div></div>\n\n<img src=\"C'_Images/Slide7.PNG\" style=\"width:50%;border-radius:9px;margin:0.75rem auto 1rem;display:block;\" alt=\"Surface-bound C3b recruiting Factor B, which is cleaved by Factor D to form the surface C3 convertase C3bBb\">\n\n<h2>The Surface-Bound Alternative Pathway C3 Convertase</h2>\n<p>Factor B binds surface-attached C3b. Factor D cleaves Factor B → Ba (released) + Bb. Bb stays, forming <strong>C3bBb</strong> — the surface-bound alternative pathway C3 convertase. This complex is inherently unstable.</p>\n\n<p>''Which molecule stabilises C3bBb, significantly extending its lifespan?''</p>\n\n[[A) Factor H|Alternative-Q4-Incorrect-FactorH]]\n[[B) Properdin (Factor P)|Alternative-Q4-Correct-Properdin]]\n[[C) CD59 (Protectin)|Alternative-Q4-Incorrect-CD59]]", "Alternative-Q4-Incorrect-FactorH": "<div class=\"section-label alternative\">Alternative Pathway</div>\n<div class=\"feedback-incorrect\">\n<strong>Not quite.</strong> Factor H actually plays the opposite role — it is a <strong>negative regulator</strong>. It competes with Factor B for C3b binding, accelerates decay of C3bBb, and acts as a cofactor for Factor I to cleave C3b into inactive iC3b. Factor H preferentially acts on host cell surfaces (recognising sialic acid), protecting them from complement attack.\n</div>\n[[← Try again|Alternative-Surface-FactorB]]", "Alternative-Q4-Incorrect-CD59": "<div class=\"section-label alternative\">Alternative Pathway</div>\n<div class=\"feedback-incorrect\">\n<strong>Incorrect.</strong> CD59 acts much later in the cascade — it inhibits the Membrane Attack Complex (MAC) by blocking C9 polymerisation on host cell surfaces. It does not stabilise C3bBb.\n</div>\n[[← Try again|Alternative-Surface-FactorB]]", "Alternative-Q4-Correct-Properdin": "<div class=\"section-label alternative\">Alternative Pathway</div>\n<div class=\"feedback-correct\">\n<strong>Correct!</strong> Properdin (Factor P) is the only known <strong>positive regulator</strong> of complement. It binds to C3bBb, forming <strong>C3bBbP</strong>, and dramatically increases the convertase's half-life — allowing it to cleave many more C3 molecules and powerfully amplify the cascade.\n</div>\n<div style=\"margin:.6rem 0 .8rem;padding:.5rem .85rem;background:#e8f9ef;border-left:3px solid #27a85f;border-radius:0 7px 7px 0;font-size:.93rem;color:#14472e\"><strong>Remember:</strong> Properdin (Factor P) is the only known positive regulator of complement — all others are inhibitory.</div>\n[[Continue → Alternative Pathway Summary|Alternative-Summary]]", "Alternative-Summary": "<div class=\"section-label alternative\">Alternative Pathway</div>\n\n<img src=\"C'_Images/Slide14.3.PNG\" style=\"width:50%;border-radius:9px;margin:0.75rem auto 1rem;display:block;\" alt=\"Summary diagram of the Alternative pathway amplification loop: C3b generating more C3 convertase\">\n\n<h2>Alternative Pathway: Summary</h2>\n<p>Well done — you have traced the alternative pathway through to its surface-bound C3 convertase. The shared steps ahead cover C5 convertase formation, MAC assembly, and effector outcomes.</p>\n\n<div class=\"key-box\">\n<strong>1. Spontaneous C3 Tick-Over</strong><br>\nC3 undergoes slow spontaneous hydrolysis in plasma → C3(H2O). This low-level activation occurs continuously — no antibody or pattern recognition required.\n</div>\n\n<div class=\"key-box\">\n<strong>2. Fluid-Phase C3 Convertase</strong><br>\nC3(H2O) binds Factor B. Factor D cleaves Factor B → Ba (released) + Bb. The complex <strong>C3(H2O)Bb</strong> acts as the initial (fluid-phase) C3 convertase, generating C3b.\n</div>\n\n<div class=\"key-box\">\n<strong>3. Surface-Bound C3 Convertase &amp; Amplification</strong><br>\nC3b deposits on pathogen surfaces. Surface-bound C3b binds Factor B; Factor D cleaves it → <strong>C3bBb</strong>. This is amplified massively — each C3bBb cleaves many C3 molecules, depositing more C3b.\n</div>\n\n<div class=\"key-box\">\n<strong>4. Stabilisation by Properdin</strong><br>\nProperdin (Factor P) — the only known positive regulator of complement — binds C3bBb → <strong>C3bBbP</strong>, extending its half-life and driving further amplification.\n</div>\n\n<div class=\"key-box\">\n<strong>5. Shared Terminal Pathway</strong><br>\nFrom here, the shared steps cover C5 convertase formation (<strong>C3bBb3bP</strong>), MAC assembly (C5b + C6-C7-C8 + 18–22 × C9), and the three effector outcomes of complement activation.\n</div>\n\n[[Continue → Shared Steps (C3 Cleavage)|Shared-C3-Cleavage-From-Alternative]]", 
"Lectin-Intro": "<div class=\"section-label lectin\">Lectin Pathway</div>\n<div class=\"progress-label\">Lectin Pathway · Step 1 of 3</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:25%\"></div></div>\n\n<img src=\"C'_Images/Slide15.PNG\" style=\"width:50%;border-radius:9px;margin:0.75rem auto 1rem;display:block;\" alt=\"Lectin pathway: MBL and Ficolins recognising microbial carbohydrate patterns (mannose, N-acetylglucosamine)\">\n\n<h2>Recognising Microbial Carbohydrates</h2>\n<p>The lectin pathway is initiated by <strong>pattern recognition molecules</strong> (lectins) binding to specific carbohydrate structures on microbial surfaces — structures absent or hidden on host cells.</p>\n\n<div class=\"key-box\">\n<strong>Key initiators:</strong><br>\nMannose-Binding Lectin (MBL) \u2014 the primary pattern-recognition molecule<br>\nFicolins \u2014 structurally similar proteins recognising acetylated carbohydrates<br><br>\nBoth are structurally similar to C1q and associate with <strong>MBL-Associated Serine Proteases (MASPs)</strong>.\n</div>\n\n<p>''MBL primarily recognises what type of molecular pattern on pathogen surfaces?''</p>\n\n[[A) Lipopolysaccharide (LPS)|Lectin-Q1-Incorrect-LPS]]\n[[B) Peptidoglycan|Lectin-Q1-Incorrect-Peptidoglycan]]\n[[C) Mannose and N-acetylglucosamine residues|Lectin-Q1-Correct-Mannose]]\n[[D) Double-stranded RNA|Lectin-Q1-Incorrect-dsRNA]]", "Lectin-Q1-Incorrect-LPS": "<div class=\"section-label lectin\">Lectin Pathway</div>\n<div class=\"feedback-incorrect\">\n<strong>Not quite.</strong> LPS is a potent microbial pattern, but it is primarily recognised by Toll-like receptors (e.g. TLR4) and can activate the alternative pathway. It is not the main target of MBL.\n</div>\n[[← Try again|Lectin-Intro]]", "Lectin-Q1-Incorrect-Peptidoglycan": "<div class=\"section-label lectin\">Lectin Pathway</div>\n<div class=\"feedback-incorrect\">\n<strong>Incorrect.</strong> Peptidoglycan in bacterial cell walls is recognised by NOD-like receptors, not by MBL.\n</div>\n[[← Try again|Lectin-Intro]]", "Lectin-Q1-Incorrect-dsRNA": "<div class=\"section-label lectin\">Lectin Pathway</div>\n<div class=\"feedback-incorrect\">\n<strong>Incorrect.</strong> Double-stranded RNA is a viral pattern recognised by Toll-like receptors (e.g. TLR3), not by MBL.\n</div>\n[[← Try again|Lectin-Intro]]", "Lectin-Q1-Correct-Mannose": "<div class=\"section-label lectin\">Lectin Pathway</div>\n<div class=\"feedback-correct\">\n<strong>Correct!</strong> MBL binds to mannose, fucose, and N-acetylglucosamine (GlcNAc) residues arranged in patterns on microbial surfaces.\n</div>\n<div style=\"margin:.6rem 0 .8rem;padding:.5rem .85rem;background:#e8f9ef;border-left:3px solid #27a85f;border-radius:0 7px 7px 0;font-size:.93rem;color:#14472e\"><strong>Remember:</strong> MBL recognises mannose-rich patterns common on microbes but absent on host cells — a key principle of innate pattern recognition.</div>\n[[Continue → MASP Activation|Lectin-MASP-Activation]]", "Lectin-MASP-Activation": "<div class=\"section-label lectin\">Lectin Pathway</div>\n<div class=\"progress-label\">Lectin Pathway · Step 2 of 3</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:50%\"></div></div>\n\n<h2>MBL/Ficolin–MASP Complex Activation</h2>\n<p>MBL and ficolins circulate linked to MASPs. When MBL/Ficolin binds its carbohydrate target:</p>\n<div class=\"key-box\">\n1. Conformational change in MBL/Ficolin<br>\n2. Autoactivation of <strong>MASP-1</strong><br>\n3. MASP-1 cleaves and activates <strong>MASP-2</strong><br>\n4. MASP-2 carries the pathway forward (similar to C1s in the classical pathway)\n</div>\n\n<p>''Which MASP is primarily responsible for cleaving C4 and C2?''</p>\n\n[[A) MASP-1|Lectin-Q2-Incorrect-MASP1]]\n[[B) MASP-2|Lectin-Q2-Correct-MASP2]]\n[[C) MASP-3|Lectin-Q2-Incorrect-MASP3]]", "Lectin-Q2-Incorrect-MASP1": "<div class=\"section-label lectin\">Lectin Pathway</div>\n<div class=\"feedback-incorrect\">\n<strong>Not entirely.</strong> MASP-1 autoactivates first and cleaves MASP-2, but MASP-2 is the primary enzyme responsible for cleaving C4 and C2 to form the C3 convertase.\n</div>\n[[← Try again|Lectin-MASP-Activation]]", "Lectin-Q2-Incorrect-MASP3": "<div class=\"section-label lectin\">Lectin Pathway</div>\n<div class=\"feedback-incorrect\">\n<strong>Incorrect.</strong> MASP-3's role in C4/C2 cleavage is not well established. Some research suggests it may be involved in activating Factor D in the alternative pathway.\n</div>\n[[← Try again|Lectin-MASP-Activation]]", "Lectin-Q2-Correct-MASP2": "<div class=\"section-label lectin\">Lectin Pathway</div>\n<div class=\"feedback-correct\">\n<strong>Excellent!</strong> Activated MASP-2 is the primary effector enzyme of the lectin pathway. It cleaves C4 and then C2 — functionally identical to C1s in the classical pathway.\n</div>\n<div style=\"margin:.6rem 0 .8rem;padding:.5rem .85rem;background:#e8f9ef;border-left:3px solid #27a85f;border-radius:0 7px 7px 0;font-size:.93rem;color:#14472e\"><strong>Remember:</strong> MASP-2 is functionally equivalent to C1s — both cleave C4 then C2 to form C4b2a. The lectin pathway uses lectins where the classical pathway uses antibodies.</div>\n[[Continue → C4 and C2 Cleavage|Lectin-C4-Cleavage]]", "Lectin-C4-Cleavage": "<div class=\"section-label lectin\">Lectin Pathway</div>\n<div class=\"progress-label\">Lectin Pathway · Step 3 of 3</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:75%\"></div></div>\n\n<h2><img src=\"C'_Images/Slide16.PNG\" style=\"width:50%;border-radius:9px;margin:0.75rem auto 1rem;display:block;\" alt=\"MASP-2 cleaving C4 and C2 to form the Lectin pathway C3 convertase C4b2a\">\n\nC4 and C2 Cleavage by MASP-2</h2>\n<p>MASP-2 acts on C4 identically to C1s in the classical pathway:</p>\n<div class=\"key-box\">\n<strong>C4 → C4a</strong> (small anaphylatoxin, released) + <strong>C4b</strong> (attaches to pathogen surface)\n</div>\n<p>C2 then binds to surface-anchored C4b. MASP-2 cleaves C2:</p>\n<div class=\"key-box\">\n<strong>C2 → C2a</strong> (large, catalytic — stays with C4b) + <strong>C2b</strong> (small, released)\n</div>\n<p>The complex <strong>C4b2a</strong> — the <strong>Lectin Pathway C3 Convertase</strong> — is now formed. It is identical in composition and function to the classical pathway C3 convertase.</p>\n\n[[Continue → C3 Cleavage (shared steps)|Shared-C3-Cleavage-From-Alternative]]", "Shared-C3-Cleavage-From-Alternative": "<div class=\"section-label shared\">Shared Steps</div>\n<div class=\"progress-label\">Shared Steps · Step 1 of 4</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:25%\"></div></div>\n\n<h2>C3 Cleavage: All Pathways Converge</h2>\n<p>All three pathways have now produced a <strong>C3 convertase</strong>:</p>\n<div class=\"key-box\">\nClassical / Lectin: <strong>C4b2a</strong><br>\nAlternative: <strong>C3bBbP</strong>\n</div>\n<p>The C3 convertase cleaves hundreds of C3 molecules into:</p>\n<div class=\"key-box\">\n<strong>C3a</strong> — potent anaphylatoxin and chemoattractant (triggers inflammation)<br>\n<strong>C3b</strong> — major opsonin (coats pathogens, tagging them for phagocytosis via CR1 receptors)\n</div>\n<p>Crucially, some C3b binds to the C3 convertase itself to form the C5 convertase — essential to progress toward the Membrane Attack Complex.</p>\n<div style=\"background:#fff3cd;border:1px solid #ffc107;border-radius:9px;padding:.75rem 1rem;margin:.85rem 0;font-size:.94rem;\">\n<strong>\u26a1 Amplification:</strong> C3b deposited by <em>any</em> pathway can bind Factor B on nearby surfaces, recruiting Factor D to form more C3bBb. This <strong>Alternative Pathway amplification loop</strong> accounts for ~80% of all C3b deposited during a complement response — even when activation was initiated classically or via lectin. The Alternative Pathway is therefore both an independent initiator <em>and</em> a universal amplifier.\n</div>\n\n<p>''Besides opsonisation, what is another critical role of C3b generated by the C3 convertase?''</p>\n\n[[A) Directly lysing bacterial cells|Shared-Q1-Incorrect-Lysis]]\n[[B) Binding to the C3 convertase to form the C5 convertase|Shared-Q1-Correct-C5ConvertaseFormation]]\n[[C) Activating Factor D|Shared-Q1-Incorrect-ActivateFactorD]]", "Shared-Q1-Incorrect-Lysis": "<div class=\"section-label shared\">Shared Steps</div>\n<div class=\"feedback-incorrect\">\n<strong>Not quite.</strong> C3b is not directly lytic. Cell lysis is mediated by the Membrane Attack Complex (MAC), which forms later in the cascade.\n</div>\n[[← Try again|Shared-C3-Cleavage-From-Alternative]]", "Shared-Q1-Incorrect-ActivateFactorD": "<div class=\"section-label shared\">Shared Steps</div>\n<div class=\"feedback-incorrect\">\n<strong>Incorrect.</strong> Factor D is already active in plasma. Its role is to cleave Factor B when Factor B is bound to C3b or C3(H2O). C3b does not activate Factor D.\n</div>\n[[← Try again|Shared-C3-Cleavage-From-Alternative]]", "Shared-Q1-Correct-C5ConvertaseFormation": "<div class=\"section-label shared\">Shared Steps</div>\n<div class=\"feedback-correct\">\n<strong>Correct!</strong> When a newly generated C3b binds to the existing C3 convertase, it changes the complex's substrate specificity — forming the C5 convertase. (Classical/Lectin: C4b2a3b; Alternative: C3bBb3bP)\n</div>\n<div style=\"margin:.6rem 0 .8rem;padding:.5rem .85rem;background:#e8f9ef;border-left:3px solid #27a85f;border-radius:0 7px 7px 0;font-size:.93rem;color:#14472e\"><strong>Remember:</strong> Adding C3b to the C3 convertase changes its substrate from C3 to C5 — the same complex, shifted specificity.</div>\n[[Continue → C5 Convertase|Shared-C5-Convertase-Formation]]", "Shared-C5-Convertase-Formation": "<div class=\"section-label shared\">Shared Steps</div>\n<div class=\"progress-label\">Shared Steps · Step 2 of 4</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:50%\"></div></div>\n\n<img src=\"C'_Images/Slide4.PNG\" style=\"width:85%;border-radius:9px;margin:0.75rem auto 1rem;display:block;\" alt=\"C5 convertase cleaving C5 into C5a anaphylatoxin and C5b, initiating MAC assembly\">\n\n<h2>Formation of the C5 Convertase</h2>\n<div class=\"key-box\">\nC4b2a + C3b → <strong>C4b2a3b</strong> (Classical/Lectin C5 Convertase)<br>\nC3bBbP + C3b → <strong>C3bBb3bP</strong> (Alternative C5 Convertase)\n</div>\n<p>The C5 convertase cleaves its substrate, C5, which is the next step toward the Membrane Attack Complex (MAC).</p>\n\n<p>''What is the substrate of the C5 convertase?''</p>\n\n[[A) C3|Shared-Q2-Incorrect-C3]]\n[[B) C5|Shared-Q2-Correct-C5]]\n[[C) C4|Shared-Q2-Incorrect-C4]]", "Shared-Q2-Incorrect-C3": "<div class=\"section-label shared\">Shared Steps</div>\n<div class=\"feedback-incorrect\">\n<strong>Not quite.</strong> The enzyme that cleaves C3 is the C3 convertase. The C5 convertase — formed by the addition of another C3b — has a different, new substrate.\n</div>\n[[← Try again|Shared-C5-Convertase-Formation]]", "Shared-Q2-Incorrect-C4": "<div class=\"section-label shared\">Shared Steps</div>\n<div class=\"feedback-incorrect\">\n<strong>Incorrect.</strong> C4 is cleaved much earlier — by C1s (Classical) or MASP-2 (Lectin) — to produce C4b, one of the building blocks of the C3 convertase. By the time the C5 convertase forms, C4 has already played its role.\n</div>\n[[← Try again|Shared-C5-Convertase-Formation]]", "Shared-Q2-Correct-C5": "<div class=\"section-label shared\">Shared Steps</div>\n<div class=\"feedback-correct\">\n<strong>Exactly!</strong> The C5 convertase cleaves C5, the next step toward the Membrane Attack Complex.\n</div>\n<div style=\"margin:.6rem 0 .8rem;padding:.5rem .85rem;background:#e8f9ef;border-left:3px solid #27a85f;border-radius:0 7px 7px 0;font-size:.93rem;color:#14472e\"><strong>Remember:</strong> The name change from C3 convertase to C5 convertase reflects the substrate shift, not a completely new complex.</div>\n[[Continue → C5 Cleavage|Shared-C5-Cleavage]]", "Shared-C5-Cleavage": "<div class=\"section-label shared\">Shared Steps</div>\n<div class=\"progress-label\">Shared Steps · Step 3 of 4</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:75%\"></div></div>\n\n<img src=\"C'_Images/Slide4.5.PNG\" style=\"width:85%;border-radius:9px;margin:0.75rem auto 1rem;display:block;\" alt=\"C5 convertase cleaving C5 into C5a anaphylatoxin and C5b, initiating MAC assembly\">\n\n<h2>Cleavage of C5</h2>\n<p>The C5 convertase cleaves C5 into:</p>\n<div class=\"key-box\">\n<strong>C5a</strong> — the most potent anaphylatoxin; a powerful chemoattractant driving inflammation <em>(potency order: C5a >> C3a >> C4a)</em><br>\n<strong>C5b</strong> — the larger fragment; initiates MAC assembly by binding C6\n</div>\n\n<div class=\"key-box\">\n<strong>Important:</strong> Unlike C3b and C4b, C5b does NOT have a thioester bond. It does not covalently attach to surfaces but undergoes a conformational change that exposes a binding site for C6.\n</div>\n\n<p>''Which statement accurately describes C5b?''</p>\n\n[[A) It is a potent anaphylatoxin|Shared-Q3-Incorrect-C5aIsAnaphylatoxin]]\n[[B) It covalently binds to pathogen surfaces like C3b|Shared-Q3-Incorrect-C5bNoThioester]]\n[[C) It initiates MAC assembly by binding C6|Shared-Q3-Correct-C5bBindsC6]]", "Shared-Q3-Incorrect-C5aIsAnaphylatoxin": "<div class=\"section-label shared\">Shared Steps</div>\n<div class=\"feedback-incorrect\">\n<strong>Careful!</strong> You are thinking of <strong>C5a</strong> (the small fragment), which is the potent anaphylatoxin. The question asks specifically about <strong>C5b</strong> — the large fragment, which has a very different role.\n</div>\n[[← Try again|Shared-C5-Cleavage]]", "Shared-Q3-Incorrect-C5bNoThioester": "<div class=\"section-label shared\">Shared Steps</div>\n<div class=\"feedback-incorrect\">\n<strong>Common misconception.</strong> C3b and C4b have thioester bonds and covalently attach to surfaces, but <strong>C5b does not</strong>. Instead, it undergoes a conformational change and associates non-covalently with the membrane before C7 anchors the developing MAC.\n</div>\n[[← Try again|Shared-C5-Cleavage]]", "Shared-Q3-Correct-C5bBindsC6": "<div class=\"section-label shared\">Shared Steps</div>\n<div class=\"feedback-correct\">\n<strong>Correct!</strong> C5b is the foundational piece for MAC assembly. Once generated, it rapidly binds C6, starting the sequential assembly of the lytic pore.\n</div>\n<div style=\"margin:.6rem 0 .8rem;padding:.5rem .85rem;background:#e8f9ef;border-left:3px solid #27a85f;border-radius:0 7px 7px 0;font-size:.93rem;color:#14472e\"><strong>Remember:</strong> C5b has no thioester bond — it doesn't attach covalently. Its conformational change exposes a binding site for C6 to start MAC assembly.</div>\n[[Continue → MAC Assembly|Shared-MAC-C5b6]]", "Shared-MAC-C5b6": "<div class=\"section-label shared\">Shared Steps</div>\n<div class=\"progress-label\">Shared Steps · Step 4 of 4 — MAC Assembly</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:100%\"></div></div>\n\n<img src=\"C'_Images/Slide8.PNG\" style=\"width:70%;border-radius:9px;margin:0.75rem auto 1rem;display:block;\" alt=\"MAC assembly: C5b recruiting C6, C7, C8, then 18-22 C9 subunits polymerising into a transmembrane pore\">\n\n<h2>MAC Assembly: C5b → C5b-9</h2>\n<p>MAC assembly proceeds sequentially:</p>\n<div class=\"key-box\">\n<strong>C5b + C6</strong> → C5b-6 complex (stable in solution)<br>\n<strong>+ C7</strong> → C5b-7 (hydrophobic region exposed; inserts into lipid bilayer)<br>\n<strong>+ C8</strong> → C5b-8 (forms small, unstable pore ~10Å; can lyse red blood cells)<br>\n<strong>+ 18–22 × C9</strong> → <strong>C5b-9 (MAC)</strong> — large stable pore ~70–100Å\n</div>\n\n<div style=\"margin:.5rem 0 .8rem;padding:.5rem .85rem;background:#f0f4ff;border-left:3px solid #4a70c4;border-radius:0 7px 7px 0;font-size:.93rem;\"><strong>Target specificity:</strong> MAC effectively kills <strong>Gram-negative bacteria</strong> and enveloped viruses — their thin outer membranes are readily penetrated. <strong>Gram-positive bacteria</strong> are inherently resistant: their thick peptidoglycan wall prevents C5b-7 membrane insertion. This explains why MAC deficiency selectively predisposes to <em>Neisseria</em> infections.</div>\n<p>''What is the ultimate consequence of MAC formation on a target cell?''</p>\n\n[[A) Opsonisation for phagocytosis|Shared-Q4-Incorrect-Opsonization]]\n[[B) Release of inflammatory mediators|Shared-Q4-Incorrect-Inflammation]]\n[[C) Loss of osmotic integrity and cell lysis|Shared-Q4-Correct-Lysis]]", "Shared-Q4-Incorrect-Opsonization": "<div class=\"section-label shared\">Shared Steps</div>\n<div class=\"feedback-incorrect\">\n<strong>Not the MAC's direct role.</strong> Opsonisation — tagging pathogens for phagocytosis — is mediated earlier by <strong>C3b</strong> and <strong>C4b</strong> binding to surfaces. The MAC (C5b-9) has a different mechanism of action.\n</div>\n[[← Try again|Shared-MAC-C5b6]]", "Shared-Q4-Incorrect-Inflammation": "<div class=\"section-label shared\">Shared Steps</div>\n<div class=\"feedback-incorrect\">\n<strong>Inflammation is driven earlier.</strong> The anaphylatoxins <strong>C3a, C5a, and C4a</strong> — generated earlier in the cascade — drive inflammation. The MAC's direct function on target cells is different.\n</div>\n[[← Try again|Shared-MAC-C5b6]]", "Shared-Q4-Correct-Lysis": "<div class=\"section-label shared\">Shared Steps</div>\n<div class=\"feedback-correct\">\n<strong>Absolutely!</strong> The MAC pore disrupts the membrane's integrity. Ions and water rush in, cytoplasmic contents leak out, leading to osmotic swelling and cell lysis.\n</div>\n<div style=\"margin:.6rem 0 .8rem;padding:.5rem .85rem;background:#e8f9ef;border-left:3px solid #27a85f;border-radius:0 7px 7px 0;font-size:.93rem;color:#14472e\"><strong>Remember:</strong> The MAC pore disrupts osmotic integrity — water rushes in, the cell swells and bursts. This is why Gram-negative bacteria are particularly vulnerable.</div>\n[[Continue → Pathway Summary|Complement-Summary]]", "Complement-Summary": "<div class=\"section-label shared\">Summary</div>\n\n<img src=\"C'_Images/Slide14.1.PNG\" style=\"width:65%;border-radius:9px;margin:0.75rem auto 1rem;display:block;\" alt=\"Overview diagram of complement activation outcomes: opsonisation, inflammation, direct lysis, and immune complex clearance\">\n\n<h2>Complement Activation: Key Outcomes</h2>\n<p>Well done — you have traced a complement pathway through to MAC formation!</p>\n\n<div class=\"key-box\">\n<strong>1. Opsonisation</strong> (C3b, C4b)<br>\nPathogens coated with these fragments are tagged for phagocytosis by cells expressing complement receptors (e.g. CR1 on macrophages and neutrophils).\n</div>\n\n<div class=\"key-box\">\n<strong>2. Inflammation</strong> (C3a, C5a, C4a — anaphylatoxins)<br>\nThese peptides bind receptors on mast cells, endothelial cells and phagocytes, causing histamine release, smooth muscle contraction, vasodilation, and recruitment of immune cells.\n</div>\n\n<div class=\"key-box\">\n<strong>3. Direct Lysis</strong> (MAC / C5b-9)<br>\nAssembly of C5b + C6 + C7 + C8 + multiple C9 molecules forms a pore that disrupts osmotic integrity, lysing Gram-negative bacteria, enveloped viruses, and other susceptible pathogens.\n</div>\n\n<div class=\"key-box\">\n<strong>4. Immune Complex Clearance</strong><br>\nC3b and C4b coat antibody\u2013antigen (immune) complexes, preventing precipitation in tissues. <strong>CR1 (CD35) on red blood cells</strong> binds these opsonised complexes and transports them to the liver and spleen, where macrophages strip and destroy them.<br>\n<em>Clinical link: C1q, C2, or C4 deficiency impairs this clearance mechanism \u2014 immune complexes accumulate in tissues, driving the SLE-like phenotype seen in classical pathway deficiencies.</em>\n</div>\n\n<div class=\"key-box\">\n<strong>5. Bridge to Adaptive Immunity</strong> (C3d / CR2)<br>\nC3b deposited on antigens is progressively cleaved to <strong>C3d</strong>, which remains covalently attached. C3d binds <strong>CR2 (CD21)</strong> on B cells — part of the B cell co-stimulatory complex — lowering the B cell activation threshold by up to 1,000-fold. This is how complement amplifies antibody production against tagged pathogens, bridging innate and adaptive immunity.\n</div>\n[[Explore Complement Regulation|Regulation_Intro]]\n[[Return to Pathway Selection|Start-Complement]]", "Regulation_Intro": "<div class=\"section-label regulation\">Regulation</div>\n<div class=\"progress-label\">Regulation · Step 1 of 4</div>\n<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:25%\"></div></div>\n\n<h2>Complement Regulation: Keeping a Powerful System in Check</h2>\n<p>Uncontrolled complement activation can damage host tissues, contributing to autoimmune disease and inflammation. Regulatory proteins control the cascade at multiple points:</p>\n<div class=\"key-box\">\n• Inhibiting convertase formation<br>\n• Accelerating convertase decay<br>\n• Inactivating key complement components<br>\n• Inhibiting MAC formation\n</div>\n\n<p>''Why is tight regulation of the complement system essential for the host?''</p>\n\n[[A) To ensure pathogens are killed more efficiently|Regulation_Q1_Incorrect_Efficiency]]\n[[B) To prevent excessive inflammation and damage to host cells/tissues|Regulation_Q1_Correct_PreventSelfDamage]]\n[[C) To conserve complement proteins for future infections|Regulation_Q1_Incorrect_ConserveProteins]]", "Regulation_Q1_Incorrect_Efficiency": "<div class=\"section-label regulation\">Regulation</div>\n<div class=\"feedback-incorrect\">\n<strong>Not quite.</strong> Regulation actually limits complement activity — the goal is to prevent damage to self, not to maximise pathogen killing.\n</div>\n[[← Try again|Reg
